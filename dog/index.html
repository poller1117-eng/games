<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>汪汪紀元：中古傳奇 2.0 — 重製版</title>
<style>
  :root {
    --c-gold: #f9d77a;
    --c-dark: #1a1008;
    --c-border: #6b4a26;
    --c-bg: #2a1d10;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    width: 100%; height: 100%;
    background: #0a0604;
    font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #f4e6c8;
    overflow: hidden;
  }
  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
  
  /* 頂部狀態列 */
  #hud {
    padding: 10px 20px;
    background: linear-gradient(180deg, #3d2b1a, #1a1008);
    border-bottom: 3px solid var(--c-border);
    display: flex; gap: 15px; align-items: center;
    z-index: 10;
  }
  .stat { display: flex; align-items: center; gap: 6px; padding: 5px 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--c-border); border-radius: 8px; font-weight: bold; }
  .stat-val { color: var(--c-gold); font-size: 18px; }
  .title { flex: 1; text-align: center; font-size: 20px; font-weight: 900; color: var(--c-gold); text-shadow: 2px 2px 0 #000; letter-spacing: 2px; }
  .btn { padding: 8px 16px; border-radius: 6px; border: 2px solid #b58040; background: linear-gradient(180deg, #8c5a2c, #5a3818); color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn:active { transform: scale(0.95); }
  .btn.go { background: linear-gradient(180deg, #c84020, #802010); border-color: #ff6040; box-shadow: 0 0 10px rgba(200,64,32,0.4); }

  /* 遊戲畫面 */
  #canvasWrap { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
  canvas { background: var(--c-bg); border: 4px solid var(--c-border); box-shadow: 0 0 50px rgba(0,0,0,0.8); cursor: crosshair; }

  /* 下方英雄商店 */
  #shop {
    padding: 12px;
    background: #1a1008;
    border-top: 3px solid var(--c-border);
    display: flex; gap: 10px; overflow-x: auto;
  }
  .hero-card {
    flex: 0 0 85px; height: 110px;
    background: #2a1a0c; border: 2px solid var(--c-border); border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.2s; position: relative;
  }
  .hero-card:hover { transform: translateY(-5px); border-color: var(--c-gold); }
  .hero-card.selected { border-color: var(--c-gold); background: #3d2b1a; box-shadow: 0 0 15px rgba(249,215,122,0.5); }
  .hero-card .dog-preview { width: 50px; height: 50px; margin-bottom: 5px; }
  .hero-card .name { font-size: 12px; font-weight: bold; color: var(--c-gold); }
  .hero-card .cost { font-size: 11px; color: #ffd83a; margin-top: 2px; }

  /* 升級面板 */
  #infoPanel {
    position: absolute; left: 50%; bottom: 130px; transform: translateX(-50%);
    width: 320px; background: rgba(26,16,8,0.95); border: 2px solid var(--c-gold);
    border-radius: 15px; padding: 15px; display: none; z-index: 100;
  }
  #infoPanel.active { display: block; }
  #infoPanel h3 { color: var(--c-gold); margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
  .info-actions { display: flex; gap: 10px; margin-top: 15px; }
  .info-actions button { flex: 1; padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
  .btn-up { background: #2f8f3a; color: white; }
  .btn-sell { background: #8c2c2c; color: white; }

  /* 啟動畫面 */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
  .overlay-content { text-align: center; background: #2a1a0c; padding: 40px; border: 3px solid var(--c-gold); border-radius: 20px; }
  .overlay-content h1 { font-size: 48px; color: var(--c-gold); margin-bottom: 20px; letter-spacing: 5px; }
  
  .wave-banner {
    position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
    background: rgba(200,64,32,0.8); color: white; padding: 10px 40px;
    border-radius: 50px; font-size: 24px; font-weight: bold; display: none;
  }
</style>
</head>
<body>

<div id="app">
  <div id="hud">
    <div class="stat">🦴 <span id="goldText" class="stat-val">250</span></div>
    <div class="stat">❤️ <span id="livesText" class="stat-val">20</span></div>
    <div class="title">汪汪紀元：中古傳奇 2.0</div>
    <div class="stat">🌊 <span id="waveText" class="stat-val">0/10</span></div>
    <button id="startBtn" class="btn go">出戰</button>
  </div>

  <div id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="waveBanner" class="wave-banner">第 1 波次</div>
    <div id="infoPanel">
      <h3 id="ipName">英雄名稱</h3>
      <div id="ipStats" style="font-size:14px; line-height:1.6"></div>
      <div class="info-actions">
        <button class="btn-up" id="btnUp">升級</button>
        <button class="btn-sell" id="btnSell">售出</button>
      </div>
    </div>
  </div>

  <div id="shop"></div>
</div>

<div id="overlay">
  <div class="overlay-content">
    <h1>汪汪紀元</h1>
    <p style="font-size:18px; color:#d4b890; margin-bottom:30px;">「招募犬系英雄，守護中古大陸最後的堡壘」</p>
    <button class="btn go" style="padding:15px 60px; font-size:24px;" onclick="initGame()">開始冒險</button>
  </div>
</div>

<script>
/**
 * 遊戲常數與設定
 */
const TILE = 64;
const COLS = 14;
const ROWS = 8;
const PATH = [
  {c: 0, r: 4}, {c: 3, r: 4}, {c: 3, r: 1}, {c: 7, r: 1}, 
  {c: 7, r: 6}, {c: 10, r: 6}, {c: 10, r: 3}, {c: 13, r: 3}
];

// 英雄數據
const HERO_TYPES = {
  knight: { 
    name: '臘腸劍士', cost: 100, range: 120, dmg: 20, speed: 1.0, 
    color: '#D2691E', earType: 'long', 
    desc: '近距離快速打擊，身手敏捷。'
  },
  heavy: { 
    name: '巴哥重裝兵', cost: 150, range: 100, dmg: 45, speed: 0.7, 
    color: '#F5DEB3', earType: 'short', muzzle: true,
    desc: '重鎚揮擊，對小範圍造成劇烈傷害。'
  },
  ranger: { 
    name: '哈士奇巡林者', cost: 120, range: 220, dmg: 15, speed: 1.5, 
    color: '#708090', earType: 'pointy', eye: '#4FC3F7',
    desc: '超遠程射手，負責狙擊漏網之魚。'
  },
  samurai: { 
    name: '柴犬武士', cost: 200, range: 140, dmg: 60, speed: 1.2, 
    color: '#FF8C00', earType: 'pointy', 
    desc: '極高單體傷害，追求一閃的奧義。'
  }
};

// 敵人數據
const ENEMY_TYPES = {
  cat: { hp: 80, speed: 60, gold: 10, color: '#444' },
  fatCat: { hp: 300, speed: 30, gold: 25, color: '#f80' },
  ninja: { hp: 120, speed: 120, gold: 20, color: '#333' }
};

let state = {
  gold: 300, lives: 20, wave: 0,
  heroes: [], enemies: [], bullets: [],
  selectedType: null, selectedHero: null,
  active: false, waveInProgress: false
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

/**
 * 初始化遊戲
 */
function initGame() {
  document.getElementById('overlay').style.display = 'none';
  state.active = true;
  buildShop();
  gameLoop();
}

/**
 * 繪製角色：狗狗英雄 2.0 (純 Canvas 繪製)
 */
function drawDog(ctx, x, y, size, config, level = 1) {
  const { color, earType, eye, muzzle } = config;
  
  ctx.save();
  ctx.translate(x, y);

  // 1. 身體/底座
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, size*0.4, size*0.5, size*0.2, 0, 0, Math.PI*2); ctx.fill();

  // 2. 頭部
  ctx.fillStyle = color;
  ctx.strokeStyle = '#2a1a0c';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.45, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // 3. 耳朵
  ctx.fillStyle = color;
  if (earType === 'long') { // 臘腸垂耳
    ctx.beginPath(); ctx.ellipse(-size*0.4, 0, size*0.15, size*0.35, 0.2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(size*0.4, 0, size*0.15, size*0.35, -0.2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  } else if (earType === 'pointy') { // 哈士奇/柴犬 尖耳
    ctx.beginPath(); ctx.moveTo(-size*0.4, -size*0.2); ctx.lineTo(-size*0.25, -size*0.6); ctx.lineTo(-size*0.1, -size*0.35); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(size*0.4, -size*0.2); ctx.lineTo(size*0.25, -size*0.6); ctx.lineTo(size*0.1, -size*0.35); ctx.fill(); ctx.stroke();
  } else { // 圓短耳
    ctx.beginPath(); ctx.arc(-size*0.3, -size*0.3, size*0.15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(size*0.3, -size*0.3, size*0.15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  }

  // 4. 臉部特徵 (眼/鼻)
  ctx.fillStyle = eye || '#000';
  ctx.beginPath(); ctx.arc(-size*0.15, -size*0.05, size*0.05, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(size*0.15, -size*0.05, size*0.05, 0, Math.PI*2); ctx.fill();

  // 鼻口部
  ctx.fillStyle = muzzle ? '#e8d4a0' : 'rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.ellipse(0, size*0.15, size*0.18, size*0.12, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(0, size*0.1, size*0.04, 0, Math.PI*2); ctx.fill();

  // 5. 裝飾 (等級星)
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  if(level > 1) ctx.fillText('★'.repeat(level-1), 0, -size*0.5);

  ctx.restore();
}

/**
 * 繪製場景背景 (手繪感)
 */
function drawBackground() {
  // 草地
  ctx.fillStyle = '#2d3d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 繪製路徑 (石磚路)
  ctx.lineWidth = TILE * 0.8;
  ctx.strokeStyle = '#4a3a2a';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(PATH[0].c * TILE + TILE/2, PATH[0].r * TILE + TILE/2);
  for(let i=1; i<PATH.length; i++) {
    ctx.lineTo(PATH[i].c * TILE + TILE/2, PATH[i].r * TILE + TILE/2);
  }
  ctx.stroke();

  // 路徑裝飾 (小石塊)
  ctx.strokeStyle = '#5a4a3a';
  ctx.lineWidth = TILE * 0.6;
  ctx.setLineDash([10, 20]);
  ctx.stroke();
  ctx.setLineDash([]);

  // 格線提示 (淡淡的)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(let i=0; i<=COLS; i++) { ctx.beginPath(); ctx.moveTo(i*TILE,0); ctx.lineTo(i*TILE, canvas.height); ctx.stroke(); }
  for(let i=0; i<=ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*TILE); ctx.lineTo(canvas.width, i*TILE); ctx.stroke(); }
  
  // 終點城堡
  const end = PATH[PATH.length-1];
  ctx.fillStyle = '#333';
  ctx.fillRect(end.c * TILE + 10, end.r * TILE - 10, 44, 44);
  ctx.fillStyle = '#c0392b';
  ctx.beginPath(); ctx.moveTo(end.c * TILE + 32, end.r * TILE - 30); ctx.lineTo(end.c * TILE + 10, end.r * TILE - 10); ctx.lineTo(end.c * TILE + 54, end.r * TILE - 10); ctx.fill();
}

/**
 * 商店介面
 */
function buildShop() {
  const shopEl = document.getElementById('shop');
  Object.keys(HERO_TYPES).forEach(key => {
    const h = HERO_TYPES[key];
    const card = document.createElement('div');
    card.className = 'hero-card';
    card.innerHTML = `<canvas class="dog-preview"></canvas><div class="name">${h.name}</div><div class="cost">🦴 ${h.cost}</div>`;
    card.onclick = () => selectHeroType(key, card);
    shopEl.appendChild(card);
    
    // 預覽圖繪製
    const pCanvas = card.querySelector('canvas');
    pCanvas.width = 100; pCanvas.height = 100;
    drawDog(pCanvas.getContext('2d'), 50, 50, 80, h);
  });
}

function selectHeroType(type, el) {
  state.selectedType = type;
  document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

/**
 * 點擊 Canvas 部署或查看
 */
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  const c = Math.floor(x / TILE);
  const r = Math.floor(y / TILE);

  // 1. 點擊現有英雄
  const clickedHero = state.heroes.find(h => h.c === c && h.r === r);
  if(clickedHero) {
    state.selectedHero = clickedHero;
    showInfoPanel(clickedHero);
    return;
  }

  // 2. 部署新英雄
  if(state.selectedType) {
    const typeData = HERO_TYPES[state.selectedType];
    // 檢查路徑與金錢
    if(state.gold >= typeData.cost) {
      const onPath = isPointOnPath(c, r);
      if(!onPath) {
        state.heroes.push({
          ...typeData, type: state.selectedType,
          c, r, x: c*TILE + TILE/2, y: r*TILE + TILE/2,
          level: 1, cd: 0
        });
        state.gold -= typeData.cost;
        updateHud();
      }
    }
  }
  state.selectedHero = null;
  hideInfoPanel();
});

function isPointOnPath(c, r) {
  for(let i=0; i<PATH.length-1; i++) {
    const p1 = PATH[i], p2 = PATH[i+1];
    if(p1.c === p2.c && c === p1.c && r >= Math.min(p1.r, p2.r) && r <= Math.max(p1.r, p2.r)) return true;
    if(p1.r === p2.r && r === p1.r && c >= Math.min(p1.c, p2.c) && c <= Math.max(p1.c, p2.c)) return true;
  }
  return false;
}

/**
 * 升級面板
 */
function showInfoPanel(hero) {
  const panel = document.getElementById('infoPanel');
  panel.classList.add('active');
  document.getElementById('ipName').innerText = hero.name + ' Lv.' + hero.level;
  document.getElementById('ipStats').innerHTML = `傷害: ${hero.dmg}<br>射程: ${hero.range}<br>${hero.desc}`;
}
function hideInfoPanel() { document.getElementById('infoPanel').classList.remove('active'); }

document.getElementById('btnUp').onclick = () => {
  const h = state.selectedHero;
  if(h && h.level < 3 && state.gold >= 100) {
    state.gold -= 100;
    h.level++;
    h.dmg = Math.floor(h.dmg * 1.5);
    h.range += 20;
    updateHud();
    showInfoPanel(h);
  }
};
document.getElementById('btnSell').onclick = () => {
  const h = state.selectedHero;
  if(h) {
    state.gold += Math.floor(HERO_TYPES[h.type].cost * 0.6);
    state.heroes = state.heroes.filter(x => x !== h);
    updateHud();
    hideInfoPanel();
  }
};

/**
 * 戰鬥邏輯
 */
function startWave() {
  if(state.waveInProgress) return;
  state.wave++;
  state.waveInProgress = true;
  updateHud();
  
  const banner = document.getElementById('waveBanner');
  banner.innerText = `第 ${state.wave} 波次`;
  banner.style.display = 'block';
  setTimeout(() => banner.style.display = 'none', 2000);

  // 產生敵人
  let count = 5 + state.wave * 2;
  let interval = setInterval(() => {
    if(count <= 0) { clearInterval(interval); return; }
    const typeKey = state.wave % 3 === 0 ? 'fatCat' : (state.wave > 5 ? 'ninja' : 'cat');
    const t = ENEMY_TYPES[typeKey];
    state.enemies.push({
      ...t, hp: t.hp * (1 + state.wave * 0.2), 
      x: PATH[0].c * TILE - 32, y: PATH[0].r * TILE + 32, 
      pathIdx: 0
    });
    count--;
  }, 1000);
}

document.getElementById('startBtn').onclick = startWave;

function gameLoop() {
  if(!state.active) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function update() {
  // 1. 敵人移動
  state.enemies.forEach((e, idx) => {
    const target = PATH[e.pathIdx + 1];
    if(!target) {
      state.lives--;
      state.enemies.splice(idx, 1);
      if(state.lives <= 0) gameOver();
      return;
    }
    const tx = target.c * TILE + 32;
    const ty = target.r * TILE + 32;
    const dx = tx - e.x, dy = ty - e.y;
    const dist = Math.hypot(dx, dy);
    
    if(dist < 2) e.pathIdx++;
    else {
      e.x += (dx / dist) * e.speed * 0.02;
      e.y += (dy / dist) * e.speed * 0.02;
    }
  });

  // 2. 英雄攻擊
  state.heroes.forEach(h => {
    if(h.cd > 0) { h.cd--; return; }
    const target = state.enemies.find(e => Math.hypot(e.x - h.x, e.y - h.y) < h.range);
    if(target) {
      state.bullets.push({ x: h.x, y: h.y, target: target, dmg: h.dmg, speed: 5 });
      h.cd = Math.floor(60 / h.speed);
    }
  });

  // 3. 子彈飛行
  state.bullets.forEach((b, idx) => {
    const dx = b.target.x - b.x, dy = b.target.y - b.y;
    const dist = Math.hypot(dx, dy);
    if(dist < 5) {
      b.target.hp -= b.dmg;
      state.bullets.splice(idx, 1);
      if(b.target.hp <= 0) {
        state.gold += b.target.gold;
        state.enemies = state.enemies.filter(e => e !== b.target);
        updateHud();
      }
    } else {
      b.x += (dx / dist) * b.speed;
      b.y += (dy / dist) * b.speed;
    }
  });

  // 檢查波次結束
  if(state.waveInProgress && state.enemies.length === 0) {
    state.waveInProgress = false;
    updateHud();
  }
}

function draw() {
  drawBackground();

  // 繪製敵人 (貓)
  state.enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(e.x, e.y, 15, 0, Math.PI*2); ctx.fill();
    // 血條
    ctx.fillStyle = 'red'; ctx.fillRect(e.x-15, e.y-25, 30, 4);
    ctx.fillStyle = 'green'; ctx.fillRect(e.x-15, e.y-25, 30 * (e.hp / (ENEMY_TYPES.cat.hp * (1 + state.wave*0.2))), 4);
  });

  // 繪製英雄 (狗)
  state.heroes.forEach(h => {
    drawDog(ctx, h.x, h.y, 40, h, h.level);
    // 射程預覽 (如果是選中的)
    if(state.selectedHero === h) {
      ctx.strokeStyle = 'rgba(255,215,122,0.3)';
      ctx.beginPath(); ctx.arc(h.x, h.y, h.range, 0, Math.PI*2); ctx.stroke();
    }
  });

  // 繪製子彈
  ctx.fillStyle = '#fff';
  state.bullets.forEach(b => {
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
  });
}

function updateHud() {
  document.getElementById('goldText').innerText = state.gold;
  document.getElementById('livesText').innerText = state.lives;
  document.getElementById('waveText').innerText = `${state.wave}/10`;
}

function gameOver() {
  alert("神殿淪陷了！遊戲結束。");
  location.reload();
}

updateHud();
</script>
</body>
</html>
