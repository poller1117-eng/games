<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>幽靈漂流記 v0.4 (recipe-scroll)</title>
  <style>
/* ============ 全域 ============ */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-deep: #0a0613;
  --bg-mid: #1a1233;
  --bg-card: #251a45;
  --bg-card-hi: #312055;
  --accent: #ff7f3f;
  --accent-glow: #ffb86b;
  --ghost-blue: #7df9ff;
  --text: #f0e8ff;
  --text-dim: #a89bc7;
  --border: #3b2966;

  --r-common: #c8c8d0;
  --r-uncommon: #4ade80;
  --r-rare: #60a5fa;
  --r-epic: #c084fc;
  --r-legendary: #fbbf24;
  --r-mythic: #f87171;
}

html, body {
  height: 100%;
  font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  overflow: hidden;
  user-select: none;
}

body {
  background:
    radial-gradient(ellipse at 20% 10%, #3a1d5e 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, #1d1d6e 0%, transparent 50%),
    var(--bg-deep);
  background-attachment: fixed;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, white, transparent),
    radial-gradient(1px 1px at 80% 60%, white, transparent),
    radial-gradient(1.5px 1.5px at 50% 80%, white, transparent),
    radial-gradient(1px 1px at 30% 70%, white, transparent),
    radial-gradient(2px 2px at 70% 30%, white, transparent),
    radial-gradient(1px 1px at 90% 90%, white, transparent);
  background-size: 100% 100%;
  pointer-events: none;
  opacity: 0.4;
  z-index: 0;
}

/* ============ 螢幕 ============ */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  z-index: 1;
}
.screen.active { display: flex; }

/* ============ 標題畫面 ============ */
#title-screen {
  align-items: center;
  justify-content: center;
  text-align: center;
}
.title-content {
  max-width: 380px;
  width: 88%;
  padding: 32px 24px;
  background: rgba(37, 26, 69, 0.6);
  border-radius: 24px;
  border: 1px solid var(--border);
  backdrop-filter: blur(8px);
}
.game-title {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent-glow), var(--ghost-blue));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 4px;
  margin-bottom: 4px;
  text-shadow: 0 0 24px rgba(255, 127, 63, 0.3);
}
.game-subtitle {
  color: var(--text-dim);
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 24px;
}
.title-tagline {
  color: var(--text-dim);
  font-style: italic;
  margin: 24px 0;
  line-height: 1.6;
}
.version-tag {
  color: var(--text-dim);
  font-size: 11px;
  margin-top: 16px;
  opacity: 0.6;
}

/* ============ 按鈕 ============ */
.btn-primary, .btn-secondary {
  display: block;
  width: 100%;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  letter-spacing: 1px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #e85f1f);
  color: white;
  box-shadow: 0 0 20px rgba(255, 127, 63, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(255,127,63,0.6); }
.btn-primary:active { transform: translateY(1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-card-hi); }
.btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============ 選角畫面 ============ */
#select-screen {
  padding: 32px 16px;
  overflow-y: auto;
}
.select-header { text-align: center; margin-bottom: 24px; }
.select-header h2 { font-size: 22px; margin-bottom: 6px; }
.select-header .hint { color: var(--text-dim); font-size: 13px; }

.ghost-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  max-width: 800px;
  margin: 0 auto;
}
.ghost-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.ghost-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255, 127, 63, 0.2);
}
.ghost-card.locked {
  opacity: 0.5;
  cursor: not-allowed;
}
.ghost-card.locked::after {
  content: '🔒';
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 18px;
}
.ghost-card-avatar { font-size: 60px; margin-bottom: 12px; }
.ghost-card-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.ghost-card-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; min-height: 32px; }
.ghost-card-skill { font-size: 11px; color: var(--accent-glow); border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 8px; }

/* ============ 主畫面 ============ */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: linear-gradient(180deg, rgba(10,6,19,0.95), rgba(10,6,19,0.6));
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
}
.currency {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg-card);
  padding: 6px 14px;
  border-radius: 999px;
  font-weight: 700;
  border: 1px solid var(--border);
}
.coin-icon { font-size: 16px; }
.coin-label { color: var(--text-dim); font-size: 12px; }
.top-actions { display: flex; gap: 8px; }
.icon-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  width: 40px;
  height: 40px;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.2s;
}
.icon-btn:hover { background: var(--bg-card-hi); }
.icon-btn.has-notif::after {
  content: '';
  position: absolute;
  top: 4px; right: 4px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #ff4757;
  box-shadow: 0 0 6px #ff4757, 0 0 0 2px var(--bg-deep);
  animation: notifPulse 1.5s ease-in-out infinite;
}
.icon-btn { position: relative; }
@keyframes notifPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

.stage {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-around;
  padding: 24px 16px;
  overflow: hidden;
}
.stage-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at center, rgba(255,127,63,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.ghost-display { text-align: center; z-index: 1; }
.ghost-avatar {
  font-size: 120px;
  display: block;
  filter: drop-shadow(0 0 30px rgba(125, 249, 255, 0.4));
  margin-bottom: 8px;
}
.floating { animation: float 3s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-12px) rotate(2deg); }
}
.ghost-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.ghost-level { font-size: 13px; color: var(--text-dim); }
.exp-bar {
  width: 160px;
  height: 6px;
  background: var(--bg-card);
  border-radius: 999px;
  overflow: hidden;
  margin: 6px auto 0;
}
.exp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-glow));
  transition: width 0.3s;
}

/* ============ 魂力條 ============ */
.spirit-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  background: rgba(37, 26, 69, 0.6);
  padding: 4px 10px 4px 8px;
  border-radius: 999px;
  border: 1px solid var(--border);
}
.spirit-icon { font-size: 16px; }
.spirit-bar {
  flex: 1;
  height: 10px;
  background: rgba(0,0,0,0.4);
  border-radius: 999px;
  overflow: hidden;
  min-width: 100px;
}
.spirit-fill {
  height: 100%;
  background: linear-gradient(90deg, #7df9ff, #a78bfa);
  box-shadow: 0 0 8px rgba(125,249,255,0.5);
  transition: width 0.3s;
}
.spirit-text {
  font-size: 12px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  min-width: 60px;
  text-align: right;
}
.heal-btn {
  background: linear-gradient(135deg, #ff6b6b, #f87171);
  border: none;
  width: 24px; height: 24px;
  border-radius: 50%;
  color: white;
  font-weight: 900;
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
  box-shadow: 0 0 8px rgba(248,113,113,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.heal-btn:hover { transform: scale(1.1); }
.heal-btn:active { transform: scale(0.95); }

.drift-status {
  width: 100%;
  max-width: 380px;
  background: rgba(37, 26, 69, 0.6);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  backdrop-filter: blur(6px);
  z-index: 1;
}
.drift-msg { text-align: center; color: var(--text-dim); margin-bottom: 12px; }
.drift-progress {
  height: 12px;
  background: var(--bg-card);
  border-radius: 999px;
  overflow: hidden;
  margin: 12px 0 8px;
}
.drift-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--ghost-blue), var(--accent));
  width: 0%;
  transition: width 0.5s;
  box-shadow: 0 0 8px var(--ghost-blue);
}
.drift-timer {
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin: 8px 0 16px;
  letter-spacing: 2px;
}
.hidden { display: none !important; }

.bottom-bar {
  display: flex;
  justify-content: space-around;
  padding: 12px 16px;
  background: linear-gradient(0deg, rgba(10,6,19,0.95), rgba(10,6,19,0.6));
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--border);
}
.stat-mini {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 600;
}
.stat-mini span { color: var(--text); margin-left: 4px; font-size: 15px; }

/* ============ Modal ============ */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  backdrop-filter: blur(4px);
}
.modal.active { display: flex; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: linear-gradient(160deg, var(--bg-mid), var(--bg-deep));
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 480px;
  max-height: 88vh;
  overflow-y: auto;
  padding: 20px;
  position: relative;
}
.modal-content.small { max-width: 360px; }
.modal-content.loot-content { max-width: 420px; text-align: center; }
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-size: 20px; }
.close-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}
.close-btn:hover { color: var(--text); }

/* ============ 地圖列表 ============ */
.map-list { display: flex; flex-direction: column; gap: 10px; }
.map-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.map-card:not(.locked):hover { border-color: var(--accent); transform: translateX(4px); }
.map-card.locked { opacity: 0.5; cursor: not-allowed; }
.map-icon { font-size: 38px; }
.map-info { flex: 1; }
.map-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.map-meta { font-size: 12px; color: var(--text-dim); }
.map-loot-preview {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.rarity-dot {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block;
}

/* ============ 背包 ============ */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.tab {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 10px 14px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.bag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 8px;
  min-height: 120px;
}
.item-slot {
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  cursor: pointer;
  position: relative;
  transition: transform 0.1s;
}
.item-slot:hover { transform: scale(1.05); }
.item-slot[data-rarity="common"]    { border-color: var(--r-common); }
.item-slot[data-rarity="uncommon"]  { border-color: var(--r-uncommon); box-shadow: 0 0 8px rgba(74,222,128,0.3); }
.item-slot[data-rarity="rare"]      { border-color: var(--r-rare); box-shadow: 0 0 10px rgba(96,165,250,0.4); }
.item-slot[data-rarity="epic"]      { border-color: var(--r-epic); box-shadow: 0 0 12px rgba(192,132,252,0.5); }
.item-slot[data-rarity="legendary"] { border-color: var(--r-legendary); box-shadow: 0 0 16px rgba(251,191,36,0.6); }
.item-slot[data-rarity="mythic"]    { border-color: var(--r-mythic); box-shadow: 0 0 18px rgba(248,113,113,0.7); animation: mythicGlow 1.5s ease-in-out infinite; }
@keyframes mythicGlow {
  0%, 100% { box-shadow: 0 0 18px rgba(248,113,113,0.7); }
  50% { box-shadow: 0 0 28px rgba(248,113,113,1); }
}

.item-count {
  position: absolute;
  bottom: 2px;
  right: 4px;
  font-size: 11px;
  font-weight: 700;
  background: rgba(0,0,0,0.6);
  padding: 1px 5px;
  border-radius: 6px;
}
.item-equipped {
  position: absolute;
  top: 2px;
  left: 4px;
  font-size: 10px;
  color: var(--accent-glow);
}
.empty-hint {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--text-dim);
  padding: 40px 0;
  font-size: 13px;
}

/* ============ 物品詳情 ============ */
.item-detail {
  text-align: center;
  padding: 16px 0;
}
.item-detail-icon {
  font-size: 64px;
  margin-bottom: 12px;
}
.item-detail-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.item-rarity-label {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 8px;
}
.item-rarity-common    { background: var(--r-common); color: #333; }
.item-rarity-uncommon  { background: var(--r-uncommon); color: #051a08; }
.item-rarity-rare      { background: var(--r-rare); color: #051121; }
.item-rarity-epic      { background: var(--r-epic); color: #220140; }
.item-rarity-legendary { background: var(--r-legendary); color: #2a1a00; }
.item-rarity-mythic    { background: var(--r-mythic); color: #2a0606; }
.item-flavor {
  color: var(--text-dim);
  font-style: italic;
  font-size: 13px;
  margin: 12px 0;
  line-height: 1.5;
}
.item-stats {
  background: var(--bg-card);
  border-radius: 10px;
  padding: 10px 14px;
  margin: 12px 0;
  text-align: left;
}
.item-stat-line {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
}
.item-stat-line .stat-val { color: var(--accent-glow); font-weight: 700; }
.item-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.item-actions button { flex: 1; min-width: 100px; margin: 0; }

/* ============ 鬼魂資訊 ============ */
.ghost-detail {
  display: flex;
  gap: 16px;
  background: var(--bg-card);
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 16px;
}
.ghost-detail-avatar { font-size: 64px; }
.ghost-detail-info { flex: 1; }
.ghost-detail-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.ghost-detail-skill { font-size: 12px; color: var(--accent-glow); margin-bottom: 8px; }
.ghost-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; }
.ghost-stat-line { color: var(--text-dim); }
.ghost-stat-line span { color: var(--text); font-weight: 700; margin-left: 4px; }

.section-title {
  font-size: 14px;
  color: var(--text-dim);
  margin: 16px 0 10px;
  letter-spacing: 1px;
}

.equip-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.equip-slot {
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 2px dashed var(--border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  position: relative;
  cursor: pointer;
}
.equip-slot:hover { border-color: var(--accent); border-style: solid; }
.equip-slot-label {
  position: absolute;
  bottom: 4px;
  font-size: 10px;
  color: var(--text-dim);
}
.equip-slot.has-item { border-style: solid; }
.equip-slot.has-item[data-rarity="uncommon"]  { border-color: var(--r-uncommon); }
.equip-slot.has-item[data-rarity="rare"]      { border-color: var(--r-rare); }
.equip-slot.has-item[data-rarity="epic"]      { border-color: var(--r-epic); }
.equip-slot.has-item[data-rarity="legendary"] { border-color: var(--r-legendary); }
.equip-slot.has-item[data-rarity="mythic"]    { border-color: var(--r-mythic); }

.ghost-collection {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
}
.ghost-mini {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.ghost-mini:hover { border-color: var(--accent); }
.ghost-mini.active { border-color: var(--accent); background: var(--bg-card-hi); }
.ghost-mini.locked { opacity: 0.4; cursor: pointer; }
.ghost-mini-avatar { font-size: 32px; }
.ghost-mini-name { font-size: 11px; margin-top: 2px; color: var(--text-dim); }

/* ============ 戰利品揭曉 ============ */
.special-modal .modal-content {
  border: 2px solid var(--accent);
  box-shadow: 0 0 40px rgba(255,127,63,0.4);
}
.loot-title {
  font-size: 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent-glow));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 8px;
}
.loot-subtitle { color: var(--text-dim); margin-bottom: 20px; font-size: 13px; }
.loot-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.loot-item {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  animation: lootPop 0.4s ease-out backwards;
}
.loot-item:nth-child(1) { animation-delay: 0.1s; }
.loot-item:nth-child(2) { animation-delay: 0.2s; }
.loot-item:nth-child(3) { animation-delay: 0.3s; }
.loot-item:nth-child(4) { animation-delay: 0.4s; }

const ENHANCE_STAT_PER_LEVEL = 0.10;
const ENHANCE_MAX = 15;

function enhanceData(currentLv) {
  const next = currentLv + 1;
  if (next > ENHANCE_MAX) return null;
  if (next <= 4)  return { successRate: 1.00, mats: { ling_stone: 2 * next },                                            coin: 50 * next };
  if (next <= 9)  return { successRate: 0.80, mats: { ling_stone: 5 * next, soul_fire: next - 3 },                       coin: 200 * next };
  return            { successRate: 0.50, mats: { soul_fire: 3 * next, dark_crystal: next - 8, memory_shard: 1 },          coin: 1000 * next };
}

// ============ 音效引擎 ============
const Audio = {
  ctx: null, master: null, bgmGain: null, sfxGain: null,
  bgmNodes: [],
  cfg: { bgmOn: true, sfxOn: true, bgmVol: 0.25, sfxVol: 0.55 },

  loadCfg() {
    try { const raw = localStorage.getItem(AUDIO_KEY); if (raw) Object.assign(this.cfg, JSON.parse(raw)); } catch {}
  },
  saveCfg() { localStorage.setItem(AUDIO_KEY, JSON.stringify(this.cfg)); },

  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain(); this.master.gain.value = 1; this.master.connect(this.ctx.destination);
    this.bgmGain = this.ctx.createGain(); this.bgmGain.gain.value = this.cfg.bgmOn ? this.cfg.bgmVol : 0; this.bgmGain.connect(this.master);
    this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.cfg.sfxOn ? this.cfg.sfxVol : 0; this.sfxGain.connect(this.master);
  },
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },

  // 基本音色
  tone(freq, dur, type = 'sine', vol = 0.2, delay = 0) {
    if (!this.ctx || !this.cfg.sfxOn) return;
    const now = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator(); o.type = type; o.frequency.value = freq;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    o.connect(g); g.connect(this.sfxGain);
    o.start(now); o.stop(now + dur + 0.05);
  },
  sweep(fromF, toF, dur, type = 'sine', vol = 0.15, delay = 0) {
    if (!this.ctx || !this.cfg.sfxOn) return;
    const now = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator(); o.type = type;
    o.frequency.setValueAtTime(fromF, now);
    o.frequency.exponentialRampToValueAtTime(toF, now + dur);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    o.connect(g); g.connect(this.sfxGain);
    o.start(now); o.stop(now + dur + 0.05);
  },
  bell(freq, dur = 0.5, delay = 0) {
    if (!this.ctx || !this.cfg.sfxOn) return;
    const now = this.ctx.currentTime + delay;
    // 雙振盪器模擬鐘音
    [1, 2.76].forEach((mul, i) => {
      const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * mul;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(i ? 0.06 : 0.18, now + 0.005);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      o.connect(g); g.connect(this.sfxGain);
      o.start(now); o.stop(now + dur + 0.05);
    });
  },
  chord(freqs, dur = 0.35, type = 'sine', vol = 0.13) {
    freqs.forEach((f, i) => this.tone(f, dur, type, vol, i * 0.04));
  },
  noise(dur, vol = 0.05, delay = 0) {
    if (!this.ctx || !this.cfg.sfxOn) return;
    const now = this.ctx.currentTime + delay;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const filt = this.ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 1.5;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(filt); filt.connect(g); g.connect(this.sfxGain);
    src.start(now); src.stop(now + dur + 0.05);
  },

  // ============ 具名 SFX ============
  click()       { this.tone(700, 0.04, 'square', 0.05); },
  modalOpen()   { this.sweep(330, 660, 0.15, 'sine', 0.08); },
  modalClose()  { this.sweep(660, 330, 0.12, 'sine', 0.06); },
  toast()       { this.tone(660, 0.08, 'sine', 0.08); },
  driftStart()  { this.sweep(180, 900, 0.45, 'sine', 0.12); this.noise(0.4, 0.025); },
  driftReturn() { this.bell(523, 0.6); this.bell(784, 0.6, 0.12); },
  coin()        { this.tone(988, 0.05, 'sine', 0.1); this.tone(1318, 0.06, 'sine', 0.08, 0.04); },
  heal()        { this.tone(587, 0.18, 'sine', 0.15); this.tone(880, 0.22, 'sine', 0.12, 0.08); },
  levelUp()     { [523, 659, 784, 1047].forEach((f, i) => this.tone(f, 0.18, 'triangle', 0.18, i * 0.08)); },
  forgeSuccess(){ this.noise(0.08, 0.08); this.bell(880, 0.4, 0.08); this.bell(1175, 0.5, 0.18); },
  forgeFail()   { this.sweep(400, 80, 0.5, 'sawtooth', 0.1); },
  equip()       { this.tone(523, 0.08, 'triangle', 0.12); this.tone(784, 0.1, 'triangle', 0.1, 0.04); },
  unequip()     { this.tone(440, 0.08, 'triangle', 0.1); },
  speedup()     { this.sweep(880, 1760, 0.2, 'square', 0.08); },
  // 開箱：依品質
  lootByRarity(rarity) {
    switch (rarity) {
      case 'common':    return this.tone(523, 0.12, 'sine', 0.12);
      case 'uncommon':  return this.chord([523, 659], 0.2);
      case 'rare':      return this.chord([523, 659, 784], 0.28);
      case 'epic':      return this.chord([392, 523, 659, 784], 0.4, 'triangle', 0.15);
      case 'legendary': { this.chord([261, 329, 392, 523, 659], 0.5, 'triangle', 0.16); this.bell(1047, 0.7, 0.3); return; }
      case 'mythic':    {
        this.noise(0.2, 0.1);
        this.chord([196, 247, 311, 392, 466, 587], 0.6, 'sawtooth', 0.14);
        this.bell(1318, 1.0, 0.4);
        this.bell(1568, 0.9, 0.6);
        return;
      }
    }
  },

  // ============ BGM：程序化氛圍音樂 ============
  startBGM() {
    if (!this.ctx || !this.cfg.bgmOn || this.bgmNodes.length) return;
    const now = this.ctx.currentTime;

    // 低音 drone（兩個微微錯位的振盪器）
    [55, 55.3, 82.5].forEach(f => {
      const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = this.ctx.createGain(); g.gain.value = 0.12;
      // 慢呼吸 LFO
      const lfo = this.ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.08;
      const lfoG = this.ctx.createGain(); lfoG.gain.value = 0.05;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      o.connect(g); g.connect(this.bgmGain);
      o.start(now); lfo.start(now);
      this.bgmNodes.push(o, lfo);
    });

    // 高音 pad（D 小調）
    const padFreqs = [293.66, 349.23, 440]; // D F A
    padFreqs.forEach((f, i) => {
      const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = this.ctx.createGain(); g.gain.value = 0.018;
      const lfo = this.ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.05 + i * 0.02;
      const lfoG = this.ctx.createGain(); lfoG.gain.value = 0.015;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      o.connect(g); g.connect(this.bgmGain);
      o.start(now); lfo.start(now);
      this.bgmNodes.push(o, lfo);
    });

    // 隨機琴音點綴
    const scale = [261.63, 293.66, 349.23, 392, 440, 523.25, 587.33, 659.25];
    const pluck = () => {
      if (!this.ctx || !this.cfg.bgmOn) return;
      const f = scale[Math.floor(Math.random() * scale.length)];
      const dur = 1.2;
      const t = this.ctx.currentTime;
      const o = this.ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.06, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g); g.connect(this.bgmGain);
      o.start(t); o.stop(t + dur + 0.05);
    };
    this.pluckTimer = setInterval(() => { if (Math.random() < 0.6) pluck(); }, 2200);
  },
  stopBGM() {
    this.bgmNodes.forEach(n => { try { n.stop(); } catch {} });
    this.bgmNodes = [];
    if (this.pluckTimer) { clearInterval(this.pluckTimer); this.pluckTimer = null; }
  },

  setBgmOn(on) {
    this.cfg.bgmOn = on; this.saveCfg();
    if (!this.ctx) return;
    if (on) { this.bgmGain.gain.value = this.cfg.bgmVol; this.startBGM(); }
    else    { this.bgmGain.gain.value = 0; this.stopBGM(); }
  },
  setSfxOn(on) {
    this.cfg.sfxOn = on; this.saveCfg();
    if (this.sfxGain) this.sfxGain.gain.value = on ? this.cfg.sfxVol : 0;
  },
  setBgmVol(v) { this.cfg.bgmVol = v; this.saveCfg(); if (this.bgmGain && this.cfg.bgmOn) this.bgmGain.gain.value = v; },
  setSfxVol(v) { this.cfg.sfxVol = v; this.saveCfg(); if (this.sfxGain && this.cfg.sfxOn) this.sfxGain.gain.value = v; },
};

// ============ 狀態 ============
let state = null;

function defaultState() {
  return {
    activeGhostId: null,
    coins: 0,
    ghosts: {},        // { id: { level, exp, spirit, equipped, lastTickAt } }
    inventory: {},     // { itemId: { count } }
    equipment: [],     // [{ uid, itemId, rarity, stats, enhance }]
    drift: null,
    unlockedZones: ['old_house'],
    unlockedRecipes: ['r_paperhat', 'r_coppercoin'], // 初始解鎖兩個 common
  };
}

// ============ 存取 ============
function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
function load() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}
function resetGame() { localStorage.removeItem(SAVE_KEY); state = defaultState(); showScreen('title-screen'); }

// ============ Util ============
function uid() { return Math.random().toString(36).slice(2,10); }
function randInt(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function pickWeighted(list, weightFn) {
  const total = list.reduce((s,x)=>s+weightFn(x),0);
  let r = Math.random()*total;
  for (const x of list) { r -= weightFn(x); if (r<=0) return x; }
  return list[list.length-1];
}
function clamp(n,mi,ma){ return Math.max(mi, Math.min(ma, n)); }

function getGhost(id) { return GHOSTS.find(g=>g.id===id); }
function getZone(id)  { return ZONES.find(z=>z.id===id); }
function getItem(id)  { return ITEMS[id]; }
function activeGhost() { return state.activeGhostId ? state.ghosts[state.activeGhostId] : null; }
function activeGhostDef() { return getGhost(state.activeGhostId); }

// ============ 屬性計算 ============
function applyEnhanceToStats(stats, enhanceLv) {
  if (!stats) return {};
  const mul = 1 + (enhanceLv || 0) * ENHANCE_STAT_PER_LEVEL;
  const out = {};
  for (const k of Object.keys(stats)) out[k] = Math.max(1, Math.round(stats[k] * mul));
  return out;
}

function ghostTotalStats(ghostId) {
  const gDef = getGhost(ghostId);
  const g = state.ghosts[ghostId];
  if (!gDef || !g) return { luck:0, speed:0, courage:0, sense:0 };
  const stats = { ...gDef.baseStats };
  for (const k of Object.keys(stats)) stats[k] += (g.level - 1);
  for (const slot of Object.keys(g.equipped)) {
    const eqUid = g.equipped[slot];
    if (!eqUid) continue;
    const eq = state.equipment.find(e=>e.uid===eqUid);
    if (!eq) continue;
    const enhanced = applyEnhanceToStats(eq.stats, eq.enhance);
    for (const k of Object.keys(enhanced)) stats[k] = (stats[k]||0) + enhanced[k];
  }
  return stats;
}

// ============ 物品系統 ============
function addItem(itemId, count = 1, forcedRarity = null) {
  const def = getItem(itemId);
  if (!def) return;
  if (def.type === 'equipment') {
    const rarity = forcedRarity || rollItemRarity(itemId);
    for (let i=0; i<count; i++) {
      state.equipment.push({
        uid: uid(), itemId, rarity, enhance: 0,
        stats: scaleStatsByRarity(def.stats || {}, rarity),
      });
    }
  } else {
    if (!state.inventory[itemId]) state.inventory[itemId] = { count: 0 };
    state.inventory[itemId].count += count;
  }
}

function removeItem(itemId, count = 1) {
  const inv = state.inventory[itemId];
  if (!inv || inv.count < count) return false;
  inv.count -= count;
  if (inv.count <= 0) delete state.inventory[itemId];
  return true;
}

function hasMaterials(matObj) {
  for (const [id, n] of Object.entries(matObj)) {
    if (!state.inventory[id] || state.inventory[id].count < n) return false;
  }
  return true;
}

function consumeMaterials(matObj) {
  for (const [id, n] of Object.entries(matObj)) removeItem(id, n);
}

function rollItemRarity(itemId, weights = null) {
  weights = weights || { common: 70, uncommon: 25, rare: 4, epic: 1 };
  const arr = Object.entries(weights);
  const total = arr.reduce((s,[,w])=>s+w, 0);
  let r = Math.random()*total;
  for (const [k,w] of arr) { r -= w; if (r<=0) return k; }
  return 'common';
}

function scaleStatsByRarity(stats, rarity) {
  const mul = RARITY_STAT_MUL[rarity] || 1;
  const out = {};
  for (const k of Object.keys(stats)) out[k] = Math.max(1, Math.round(stats[k] * mul));
  return out;
}

function itemValue(itemId, rarity = 'common', enhance = 0) {
  const def = getItem(itemId);
  if (!def) return 0;
  const rMul = RARITY[rarity]?.sellMul || 1;
  const enhMul = 1 + enhance * 0.3;
  return Math.floor(def.baseValue * rMul * enhMul);
}

// ============ 漂流系統 ============
function startDrift(zoneId) {
  const zone = getZone(zoneId);
  if (!zone) return;
  if (state.drift) { toast('已經有寵物在漂流了'); return; }
  const g = activeGhost();
  const gDef = activeGhostDef();
  if (!g || !gDef) { toast('沒有可用的鬼魂'); return; }
  if (g.level < zone.minGhostLevel) { toast('鬼魂等級不足'); return; }
  if (!state.unlockedZones.includes(zoneId)) { toast('地圖未解鎖'); return; }
  if (g.spirit < zone.spiritCost) { toast(`魂力不足！需要 ${zone.spiritCost}`); return; }

  // 消耗魂力
  g.spirit = Math.max(0, g.spirit - zone.spiritCost);

  const stats = ghostTotalStats(state.activeGhostId);
  const speedMul = clamp(1 - stats.speed * 0.02, 0.6, 1);
  const duration = Math.floor(zone.duration * speedMul);

  state.drift = {
    ghostId: state.activeGhostId,
    zoneId, startTime: Date.now(), duration, done: false,
  };
  save();
  closeModal('map-modal');
  renderMain();
  Audio.driftStart();
  toast(`${gDef.name} 出發前往 ${zone.name}！消耗 ${zone.spiritCost} 魂力`);
}

function driftRemaining() {
  if (!state.drift) return 0;
  const elapsed = (Date.now() - state.drift.startTime) / 1000;
  return Math.max(0, state.drift.duration - elapsed);
}

function speedupDrift() {
  if (!state.drift) { toast('沒有正在漂流的寵物'); return; }
  if (!state.inventory['yin_pill'] || state.inventory['yin_pill'].count <= 0) { toast('沒有陰氣丹'); return; }
  removeItem('yin_pill', 1);
  const remain = driftRemaining();
  state.drift.startTime = Date.now() - (state.drift.duration - remain/2)*1000;
  save();
  Audio.speedup();
  renderMain();
  toast('使用了陰氣丹！剩餘時間減半');
}

function rollDriftLoot() {
  const zone = getZone(state.drift.zoneId);
  const gDef = getGhost(state.drift.ghostId);
  const stats = ghostTotalStats(state.drift.ghostId);

  const rarityWeights = { ...zone.rarityWeights };
  const luckBoost = 1 + stats.luck * 0.03;
  if (rarityWeights.rare)      rarityWeights.rare      *= luckBoost;
  if (rarityWeights.epic)      rarityWeights.epic      *= luckBoost * 1.2;
  if (rarityWeights.legendary) rarityWeights.legendary *= luckBoost * 1.5;
  if (rarityWeights.mythic)    rarityWeights.mythic    *= luckBoost * 2;

  let itemCount = 3 + Math.floor(stats.sense / 5);
  if (gDef.bonusDropChance && Math.random() < gDef.bonusDropChance) itemCount += 1;

  const loots = [];
  for (let i=0; i<itemCount; i++) {
    const drop = pickWeighted(zone.drops, d=>d.weight);
    const def = getItem(drop.id);
    let count = randInt(drop.count[0], drop.count[1]);
    if (def.type === 'material' && gDef.materialBoost) count = Math.ceil(count * (1 + gDef.materialBoost));
    let rarity = null;
    if (def.type === 'equipment') rarity = rollItemRarity(drop.id, rarityWeights);
    loots.push({ itemId: drop.id, count, rarity });
  }
  return loots;
}

function claimDrift() {
  if (!state.drift || driftRemaining() > 0) return;
  const zone = getZone(state.drift.zoneId);
  const rewards = zoneRewards(zone);
  const loots = rollDriftLoot();
  for (const l of loots) addItem(l.itemId, l.count, l.rarity);
  state.coins += rewards.coins;
  addExp(state.drift.ghostId, rewards.exp);
  state.drift = null;
  save();
  Audio.driftReturn();
  // 找最高品質播一次戰利品音效
  const bestRarity = loots.reduce((best, l) => {
    const r = l.rarity || 'common';
    return RARITY_ORDER.indexOf(r) > RARITY_ORDER.indexOf(best) ? r : best;
  }, 'common');
  setTimeout(() => Audio.lootByRarity(bestRarity), 350);
  showLoot(loots, rewards);
  renderMain();
}

// ============ 等級 ============
function addExp(ghostId, amount) {
  const g = state.ghosts[ghostId];
  const gDef = getGhost(ghostId);
  if (!g) return;
  g.exp += amount;
  while (g.exp >= expForLevel(g.level)) {
    g.exp -= expForLevel(g.level);
    g.level += 1;
    g.spirit = maxSpirit(g, gDef);
    Audio.levelUp();
    toast(`${gDef.name} 升到 Lv.${g.level}！魂力上限提升`);
  }
}

// ============ 魂力 ============
function spiritTick() {
  const now = Date.now();
  for (const gid of Object.keys(state.ghosts)) {
    const g = state.ghosts[gid];
    const gDef = getGhost(gid);
    if (!gDef) continue;
    // 正在漂流的不回復
    if (state.drift && state.drift.ghostId === gid) { g.lastTickAt = now; continue; }
    if (!g.lastTickAt) g.lastTickAt = now;
    const sec = (now - g.lastTickAt) / 1000;
    if (sec >= 1) {
      const max = maxSpirit(g, gDef);
      g.spirit = Math.min(max, g.spirit + sec * SPIRIT_REGEN_PER_SEC);
      g.lastTickAt = now;
    }
  }
}

// ============ 配方卷軸 ============
function useScroll(itemId) {
  const def = getItem(itemId);
  if (!def || def.type !== 'scroll') return;
  if (!state.inventory[itemId] || state.inventory[itemId].count <= 0) { toast('沒有這個卷軸'); return; }
  const recipeId = def.unlocks;
  if (state.unlockedRecipes.includes(recipeId)) {
    toast('這個配方已經學過了');
    return;
  }
  removeItem(itemId, 1);
  state.unlockedRecipes.push(recipeId);
  save();
  Audio.levelUp();
  const r = RECIPES.find(x => x.id === recipeId);
  const targetDef = r ? getItem(r.result) : null;
  toast(`✨ 解鎖配方：${targetDef ? targetDef.name : recipeId}！`);
  renderBag();
  renderMain();
}

function hasUnusedScrolls() {
  for (const [id, data] of Object.entries(state.inventory)) {
    const def = getItem(id);
    if (def && def.type === 'scroll' && data.count > 0 && !state.unlockedRecipes.includes(def.unlocks)) {
      return true;
    }
  }
  return false;
}

function useHealItem(itemId) {
  const def = getItem(itemId);
  if (!def || def.effect !== 'heal') return;
  if (!state.inventory[itemId] || state.inventory[itemId].count <= 0) { toast('沒有這個道具'); return; }
  const g = activeGhost();
  const gDef = activeGhostDef();
  if (!g) return;
  const max = maxSpirit(g, gDef);
  if (g.spirit >= max) { toast('魂力已滿'); return; }
  removeItem(itemId, 1);
  const before = Math.floor(g.spirit);
  g.spirit = Math.min(max, g.spirit + def.effectValue);
  save();
  Audio.heal();
  renderMain();
  toast(`恢復了 ${Math.floor(g.spirit) - before} 魂力`);
}

// ============ 解鎖 ============
function unlockGhost(ghostId) {
  if (state.ghosts[ghostId]) return false;
  const def = getGhost(ghostId);
  if (!def) return false;
  if (state.coins < def.unlockCost) { toast(`需要 ${def.unlockCost} 靈幣`); return false; }
  state.coins -= def.unlockCost;
  state.ghosts[ghostId] = {
    level: 1, exp: 0,
    spirit: def.baseSpirit,
    lastTickAt: Date.now(),
    equipped: { head: null, body: null, weapon: null, accessory: null },
  };
  if (!state.activeGhostId) state.activeGhostId = ghostId;
  save();
  toast(`解鎖了 ${def.name}！`);
  return true;
}

function switchActive(ghostId) {
  if (!state.ghosts[ghostId]) return;
  if (state.drift && state.drift.ghostId !== ghostId) { toast('目前有鬼魂在漂流'); return; }
  state.activeGhostId = ghostId;
  save();
  renderMain();
  toast(`已切換到 ${getGhost(ghostId).name}`);
}

function unlockZone(zoneId) {
  const zone = getZone(zoneId);
  if (!zone || state.unlockedZones.includes(zoneId)) return;
  if (state.coins < zone.unlockCost) { toast(`需要 ${zone.unlockCost} 靈幣`); return; }
  state.coins -= zone.unlockCost;
  state.unlockedZones.push(zoneId);
  save();
  toast(`解鎖地圖：${zone.name}`);
  renderMapList();
  renderMain();
}

// ============ 裝備 ============
function isEquipped(eqUid) {
  for (const gid of Object.keys(state.ghosts)) {
    const g = state.ghosts[gid];
    for (const s of Object.keys(g.equipped)) if (g.equipped[s] === eqUid) return true;
  }
  return false;
}

function equipItem(eqUid) {
  const eq = state.equipment.find(e=>e.uid===eqUid);
  if (!eq) return;
  const def = getItem(eq.itemId);
  const g = activeGhost();
  if (!g) return;
  g.equipped[def.slot] = eq.uid;
  save();
  Audio.equip();
  renderMain();
  renderGhostModal();
  closeModal('item-modal');
  toast(`穿上了 ${def.name}`);
}

function unequipUid(eqUid) {
  for (const gid of Object.keys(state.ghosts)) {
    const g = state.ghosts[gid];
    for (const s of Object.keys(g.equipped)) if (g.equipped[s] === eqUid) g.equipped[s] = null;
  }
  save();
}

function sellEquipment(eqUid) {
  const eq = state.equipment.find(e=>e.uid===eqUid);
  if (!eq) return;
  if (isEquipped(eqUid)) { toast('正在穿戴的裝備無法賣出'); return; }
  const value = itemValue(eq.itemId, eq.rarity, eq.enhance);
  state.coins += value;
  state.equipment = state.equipment.filter(e=>e.uid!==eqUid);
  save();
  Audio.coin();
  closeModal('item-modal');
  renderMain();
  renderBag();
  toast(`賣出獲得 ${value} 靈幣`);
}

function dismantleEquipment(eqUid) {
  const eq = state.equipment.find(e=>e.uid===eqUid);
  if (!eq) return;
  if (isEquipped(eqUid)) { toast('正在穿戴的裝備無法分解'); return; }
  const idx = RARITY_ORDER.indexOf(eq.rarity);
  const got = {};
  addItem('ling_stone', 1 + idx); got['靈石'] = 1 + idx;
  if (idx >= 1) { addItem('soul_fire', idx); got['魂火'] = idx; }
  if (idx >= 3) { addItem('dark_crystal', 1); got['冥晶'] = 1; }
  if (idx >= 4) { addItem('memory_shard', 1); got['記憶碎片'] = 1; }
  // 強化等級加成素材
  if (eq.enhance > 0) { addItem('soul_fire', eq.enhance); got['魂火'] = (got['魂火']||0) + eq.enhance; }
  state.equipment = state.equipment.filter(e=>e.uid!==eqUid);
  save();
  closeModal('item-modal');
  renderBag();
  const matList = Object.entries(got).map(([k,v])=>`${k}×${v}`).join('、');
  toast(`分解獲得：${matList}`);
}

function sellMaterial(itemId, n = 1) {
  const inv = state.inventory[itemId];
  if (!inv || inv.count < n) return;
  const value = itemValue(itemId, 'common') * n;
  state.coins += value;
  removeItem(itemId, n);
  save();
  Audio.coin();
  renderMain();
  renderBag();
  toast(`賣出獲得 ${value} 靈幣`);
}

// ============ 強化 ============
function enhanceEquipment(eqUid) {
  const eq = state.equipment.find(e=>e.uid===eqUid);
  if (!eq) return;
  const data = enhanceData(eq.enhance);
  if (!data) { toast('已達強化上限'); return; }
  if (!hasMaterials(data.mats)) { toast('素材不足'); return; }
  if (state.coins < data.coin) { toast(`靈幣不足（需 ${data.coin}）`); return; }

  state.coins -= data.coin;
  consumeMaterials(data.mats);
  const success = Math.random() < data.successRate;
  if (success) {
    eq.enhance += 1;
    Audio.forgeSuccess();
    toast(`強化成功！+${eq.enhance}`);
  } else {
    Audio.forgeFail();
    toast(`強化失敗，材料浪費了…`);
  }
  save();
  renderMain();
  renderForge();
  // 若正在查看物品 modal，更新它
  if (document.getElementById('item-modal').classList.contains('active')) {
    openItemDetail({ kind:'equipment', eqUid: eq.uid, itemId: eq.itemId, rarity: eq.rarity, icon: getItem(eq.itemId).icon, equipped: isEquipped(eq.uid) });
  }
}

// ============ 升階鍛造 ============
// 同部位 + 同品質 + 3件 → 高一階隨機部位（同部位優先）
function tierUpCandidates() {
  // 群組化：rarity -> slot -> [eqUids]
  const groups = {};
  for (const eq of state.equipment) {
    if (isEquipped(eq.uid)) continue;
    if (eq.rarity === 'mythic') continue;
    const def = getItem(eq.itemId);
    if (!groups[eq.rarity]) groups[eq.rarity] = {};
    if (!groups[eq.rarity][def.slot]) groups[eq.rarity][def.slot] = [];
    groups[eq.rarity][def.slot].push(eq);
  }
  // 找出每組 >= 3 件的
  const candidates = [];
  for (const r of Object.keys(groups)) {
    for (const s of Object.keys(groups[r])) {
      const arr = groups[r][s];
      if (arr.length >= TIER_UP_REQUIRED) {
        candidates.push({ rarity: r, slot: s, items: arr });
      }
    }
  }
  return candidates;
}

function performTierUp(candidate) {
  const cost = TIER_UP_COIN[candidate.rarity] || 1000;
  if (state.coins < cost) { toast(`需要 ${cost} 靈幣`); return; }
  state.coins -= cost;
  // 移除 3 件
  const removed = candidate.items.slice(0, TIER_UP_REQUIRED);
  const removedUids = new Set(removed.map(e=>e.uid));
  state.equipment = state.equipment.filter(e=>!removedUids.has(e.uid));

  // 新品質
  const idx = RARITY_ORDER.indexOf(candidate.rarity);
  const newRarity = RARITY_ORDER[idx + 1];

  // 同部位中隨機選一個物品 ID
  const sameSlotItems = Object.entries(ITEMS).filter(([id,it])=>it.type==='equipment' && it.slot===candidate.slot);
  const [newItemId] = sameSlotItems[Math.floor(Math.random()*sameSlotItems.length)];

  addItem(newItemId, 1, newRarity);
  save();
  Audio.forgeSuccess();
  setTimeout(() => Audio.lootByRarity(newRarity), 200);
  renderForge();
  renderMain();
  toast(`鍛造成功！獲得 ${RARITY[newRarity].label} 裝備`);
}

// ============ 配方鍛造 ============
function craftRecipe(recipeId) {
  const r = RECIPES.find(x=>x.id===recipeId);
  if (!r) return;
  if (!hasMaterials(r.mats)) { toast('素材不足'); return; }
  if (state.coins < r.coin) { toast(`靈幣不足（需 ${r.coin}）`); return; }
  state.coins -= r.coin;
  consumeMaterials(r.mats);
  addItem(r.result, 1, r.rarity);
  save();
  Audio.forgeSuccess();
  setTimeout(() => Audio.lootByRarity(r.rarity), 200);
  renderForge();
  renderMain();
  toast(`鍛造完成：${getItem(r.result).name} (${RARITY[r.rarity].label})`);
}

// ============ 素材合成 ============
function craftMaterial(mrId) {
  const mr = MATERIAL_RECIPES.find(x=>x.id===mrId);
  if (!mr) return;
  if (!hasMaterials(mr.input)) { toast('素材不足'); return; }
  consumeMaterials(mr.input);
  for (const [id,n] of Object.entries(mr.output)) addItem(id, n);
  save();
  Audio.forgeSuccess();
  renderForge();
  renderMain();
  const outList = Object.entries(mr.output).map(([k,v])=>`${getItem(k).name}×${v}`).join('、');
  toast(`合成獲得 ${outList}`);
}

// ============ UI 切換 ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function openModal(id)  { document.getElementById(id).classList.add('active'); Audio.modalOpen(); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); Audio.modalClose(); }
function closeAllModals() { document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active')); }

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

// ============ 渲染：主畫面 ============
function renderMain() {
  const ghost = activeGhost();
  const gDef = activeGhostDef();
  if (!ghost || !gDef) return;

  // 鍛造按鈕紅點提示（有未學的卷軸）
  const forgeBtn = document.getElementById('btn-forge');
  if (forgeBtn) forgeBtn.classList.toggle('has-notif', hasUnusedScrolls());

  document.getElementById('coin-display').textContent = state.coins;
  document.getElementById('ghost-avatar').textContent = gDef.avatar;
  document.getElementById('ghost-name').textContent = gDef.name;
  document.getElementById('ghost-level').textContent = ghost.level;

  const need = expForLevel(ghost.level);
  document.getElementById('exp-fill').style.width = `${Math.min(100, ghost.exp/need*100)}%`;

  // 魂力條
  const max = maxSpirit(ghost, gDef);
  const cur = Math.floor(ghost.spirit);
  const pct = max > 0 ? (cur/max*100) : 0;
  document.getElementById('spirit-fill').style.width = `${pct}%`;
  document.getElementById('spirit-text').textContent = `${cur} / ${max}`;

  const stats = ghostTotalStats(state.activeGhostId);
  document.getElementById('stat-luck').textContent = stats.luck;
  document.getElementById('stat-speed').textContent = stats.speed;
  document.getElementById('stat-courage').textContent = stats.courage;
  document.getElementById('stat-sense').textContent = stats.sense;

  renderDrift();
}

function renderDrift() {
  const empty = document.getElementById('drift-empty');
  const active = document.getElementById('drift-active');
  const done = document.getElementById('drift-done');

  if (!state.drift) {
    empty.classList.remove('hidden');
    active.classList.add('hidden');
    done.classList.add('hidden');
    return;
  }
  const remain = driftRemaining();
  if (remain <= 0) {
    empty.classList.add('hidden');
    active.classList.add('hidden');
    done.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  active.classList.remove('hidden');
  done.classList.add('hidden');

  const zone = getZone(state.drift.zoneId);
  const gDef = getGhost(state.drift.ghostId);
  document.getElementById('drift-msg').textContent = `${gDef.name} 正在 ${zone.name} 漂流...`;

  const progress = 100 - (remain / state.drift.duration * 100);
  document.getElementById('drift-progress-fill').style.width = `${progress}%`;

  const mm = Math.floor(remain/60).toString().padStart(2,'0');
  const ss = Math.floor(remain%60).toString().padStart(2,'0');
  document.getElementById('drift-timer').textContent = `${mm}:${ss}`;
}

// ============ 渲染：背包 ============
let currentBagTab = 'all';
function renderBag() {
  const grid = document.getElementById('bag-grid');
  grid.innerHTML = '';

  let entries = [];
  if (currentBagTab === 'all' || currentBagTab === 'equipment') {
    for (const eq of state.equipment) {
      const def = getItem(eq.itemId);
      entries.push({
        kind: 'equipment', eqUid: eq.uid, itemId: eq.itemId, rarity: eq.rarity,
        icon: def.icon, equipped: isEquipped(eq.uid), enhance: eq.enhance,
      });
    }
  }
  for (const [itemId, data] of Object.entries(state.inventory)) {
    const def = getItem(itemId);
    if (!def) continue;
    if (currentBagTab === 'material'   && def.type !== 'material')   continue;
    if (currentBagTab === 'consumable' && def.type !== 'consumable' && def.type !== 'scroll') continue;
    if (currentBagTab === 'equipment') continue;
    entries.push({ kind: def.type, itemId, count: data.count, rarity: 'common', icon: def.icon });
  }

  if (!entries.length) {
    grid.innerHTML = '<div class="empty-hint">背包空空如也...</div>';
    return;
  }

  entries.forEach(e => {
    const slot = document.createElement('div');
    slot.className = 'item-slot';
    slot.dataset.rarity = e.rarity;
    slot.innerHTML = `
      ${e.icon}
      ${e.count > 1 ? `<span class="item-count">${e.count}</span>` : ''}
      ${e.equipped ? `<span class="item-equipped">●</span>` : ''}
      ${e.enhance > 0 ? `<span class="item-enhance">+${e.enhance}</span>` : ''}
    `;
    slot.onclick = () => openItemDetail(e);
    grid.appendChild(slot);
  });
}

function openItemDetail(entry) {
  const detail = document.getElementById('item-detail');
  const actions = document.getElementById('item-actions');
  const def = getItem(entry.itemId);

  document.getElementById('item-modal-name').textContent = def.name + (entry.enhance ? ` +${entry.enhance}` : '');

  let html = `<div class="item-detail-icon">${def.icon}</div>`;
  html += `<div class="item-detail-name">${def.name}${entry.enhance ? ` <span style="color:var(--accent-glow)">+${entry.enhance}</span>` : ''}</div>`;
  if (entry.kind === 'equipment') {
    html += `<span class="item-rarity-label item-rarity-${entry.rarity}">${RARITY[entry.rarity].label}</span>`;
  }
  html += `<div class="item-flavor">「${def.flavor}」</div>`;

  if (entry.kind === 'equipment') {
    const eq = state.equipment.find(e=>e.uid===entry.eqUid);
    const slotLabel = { head:'頭飾', body:'身袍', weapon:'法器', accessory:'護符' }[def.slot];
    html += `<div class="item-stats">`;
    html += `<div class="item-stat-line"><span>裝備位</span><span class="stat-val">${slotLabel}</span></div>`;
    const enhanced = applyEnhanceToStats(eq.stats, eq.enhance);
    for (const [k,v] of Object.entries(enhanced)) {
      const label = { luck:'🍀 幸運', speed:'💨 速度', courage:'💪 膽量', sense:'👁 感知' }[k];
      const base = eq.stats[k];
      const diff = v - base;
      html += `<div class="item-stat-line"><span>${label}</span><span class="stat-val">+${v}${diff>0?` <small style="opacity:0.7">(基礎 ${base})</small>`:''}</span></div>`;
    }
    const value = itemValue(eq.itemId, eq.rarity, eq.enhance);
    html += `<div class="item-stat-line"><span>賣價</span><span class="stat-val">${value} 靈幣</span></div>`;
    html += `</div>`;
  } else {
    const value = itemValue(entry.itemId, 'common');
    const typeLabel = entry.kind === 'material' ? '素材'
                    : entry.kind === 'scroll'   ? '配方卷軸'
                    : '消耗品';
    html += `<div class="item-stats">`;
    html += `<div class="item-stat-line"><span>類型</span><span class="stat-val">${typeLabel}</span></div>`;
    html += `<div class="item-stat-line"><span>數量</span><span class="stat-val">×${entry.count}</span></div>`;
    html += `<div class="item-stat-line"><span>單價</span><span class="stat-val">${value} 靈幣</span></div>`;
    if (def.effect === 'heal') {
      html += `<div class="item-stat-line"><span>效果</span><span class="stat-val">+${def.effectValue === 9999 ? '滿' : def.effectValue} 魂力</span></div>`;
    }
    if (def.type === 'scroll') {
      const r = RECIPES.find(x => x.id === def.unlocks);
      const targetDef = r ? getItem(r.result) : null;
      const learned = state.unlockedRecipes.includes(def.unlocks);
      html += `<div class="item-stat-line"><span>解鎖</span><span class="stat-val">${targetDef ? targetDef.name : '?'} ${learned ? '（已習得）' : ''}</span></div>`;
    }
    html += `</div>`;
  }
  detail.innerHTML = html;

  actions.innerHTML = '';
  if (entry.kind === 'equipment') {
    if (entry.equipped) {
      const btn = document.createElement('button');
      btn.className = 'btn-secondary';
      btn.textContent = '脫下';
      btn.onclick = () => { unequipUid(entry.eqUid); closeModal('item-modal'); renderBag(); renderMain(); toast('已脫下'); };
      actions.appendChild(btn);
    } else {
      const btnEq = document.createElement('button');
      btnEq.className = 'btn-primary';
      btnEq.textContent = '穿戴';
      btnEq.onclick = () => equipItem(entry.eqUid);
      actions.appendChild(btnEq);
    }
    // 強化按鈕
    const eq = state.equipment.find(e=>e.uid===entry.eqUid);
    const enhData = enhanceData(eq.enhance);
    if (enhData) {
      const btnEnh = document.createElement('button');
      btnEnh.className = 'btn-secondary';
      const matsStr = Object.entries(enhData.mats).map(([k,v])=>`${getItem(k).name}×${v}`).join('、');
      btnEnh.innerHTML = `強化 +${eq.enhance + 1}<br><small style="opacity:0.7;font-size:10px">${Math.floor(enhData.successRate*100)}% ・ ${matsStr} ・ ${enhData.coin}💰</small>`;
      btnEnh.onclick = () => enhanceEquipment(eq.uid);
      actions.appendChild(btnEnh);
    }
    const btnSell = document.createElement('button');
    btnSell.className = 'btn-secondary';
    btnSell.textContent = '賣出';
    btnSell.onclick = () => sellEquipment(entry.eqUid);
    actions.appendChild(btnSell);

    const btnDis = document.createElement('button');
    btnDis.className = 'btn-secondary';
    btnDis.textContent = '分解';

    actions.appendChild(btnDis);
  } else if (def.effect === 'heal') {
    const btn = document.createElement('button');

    btn.textContent = '使用（補充魂力）';
    btn.onclick = () => { closeModal('item-modal'); useHealItem(entry.itemId); renderBag(); };
    actions.appendChild(btn);
    const btnSell = document.createElement('button');
    btnSell.className = 'btn-secondary';
    btnSell.textContent = '賣出 1 個';
    btnSell.onclick = () => sellMaterial(entry.itemId, 1);
    actions.appendChild(btnSell);
  } else if (def.type === 'scroll') {
    const learned = state.unlockedRecipes.includes(def.unlocks);
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.textContent = learned ? '已習得（無法再學）' : '學習配方';
    btn.disabled = learned;
    btn.onclick = () => { closeModal('item-modal'); useScroll(entry.itemId); renderBag(); };
    actions.appendChild(btn);
    const btnSell = document.createElement('button');
    btnSell.className = 'btn-secondary';
    btnSell.textContent = learned ? `賣出 1 個` : `賣掉（不解鎖）`;
    btnSell.onclick = () => sellMaterial(entry.itemId, 1);
    actions.appendChild(btnSell);
  } else if (entry.itemId === 'yin_pill') {
    const btnUse = document.createElement('button');
    btnUse.className = 'btn-primary';
    btnUse.textContent = '使用（加速漂流）';
    btnUse.onclick = () => { closeModal('item-modal'); speedupDrift(); };
    actions.appendChild(btnUse);
    const btnSell = document.createElement('button');
    btnSell.className = 'btn-secondary';
    btnSell.textContent = '賣出 1 個';
    btnSell.onclick = () => sellMaterial(entry.itemId, 1);
    actions.appendChild(btnSell);
  } else {
    const btn1 = document.createElement('button');
    btn1.className = 'btn-secondary';
    btn1.textContent = '賣出 1 個';
    btn1.onclick = () => sellMaterial(entry.itemId, 1);
    actions.appendChild(btn1);
    if (entry.count > 1) {
      const btnAll = document.createElement('button');
      btnAll.className = 'btn-secondary';
      btnAll.textContent = `全部賣出 (${entry.count})`;
      btnAll.onclick = () => sellMaterial(entry.itemId, entry.count);
      actions.appendChild(btnAll);
    }
  }

  openModal('item-modal');
}

// ============ 渲染：鍛造工坊 ============
let currentForgeTab = 'recipe';
function renderForge() {
  const body = document.getElementById('forge-body');
  body.innerHTML = '';

  if (currentForgeTab === 'recipe') renderForgeRecipe(body);
  else if (currentForgeTab === 'enhance') renderForgeEnhance(body);
  else if (currentForgeTab === 'tierup') renderForgeTierUp(body);
  else if (currentForgeTab === 'material') renderForgeMaterial(body);
}

function renderForgeRecipe(body) {
  const unlocked = RECIPES.filter(r => state.unlockedRecipes.includes(r.id));
  const locked = RECIPES.filter(r => !state.unlockedRecipes.includes(r.id));

  if (unlocked.length === 0) {
    body.innerHTML = '<div class="empty-hint">還沒有解鎖任何配方。<br>去漂流尋找配方卷軸吧！</div>';
  } else {
    const h1 = document.createElement('div');
    h1.className = 'forge-section-title';
    h1.textContent = `📖 已解鎖配方 (${unlocked.length}/${RECIPES.length})`;
    body.appendChild(h1);
    unlocked.forEach(r => body.appendChild(buildRecipeCard(r, false)));
  }

  if (locked.length > 0) {
    const h2 = document.createElement('div');
    h2.className = 'forge-section-title';
    h2.textContent = `🔒 未知配方 (${locked.length})`;
    body.appendChild(h2);
    locked.forEach(r => body.appendChild(buildRecipeCard(r, true)));
  }
}

function buildRecipeCard(r, isLocked) {
  const def = getItem(r.result);
  const can = !isLocked && hasMaterials(r.mats) && state.coins >= r.coin;
  const card = document.createElement('div');
  card.className = 'recipe-card' + (can ? '' : ' disabled') + (isLocked ? ' locked' : '');

  if (isLocked) {
    card.innerHTML = `
      <div class="recipe-result" data-rarity="${r.rarity}">
        <div class="recipe-icon">❓</div>
        <div class="recipe-name">???</div>
        <span class="item-rarity-label item-rarity-${r.rarity}" style="font-size:10px">${RARITY[r.rarity].label}</span>
      </div>
      <div class="recipe-body">
        <div class="recipe-desc">尚未習得此鍛造配方</div>
        <div class="recipe-meta">找「配方：${def.name}」卷軸解鎖</div>
      </div>
    `;
    return card;
  }

  const matLines = Object.entries(r.mats).map(([id,n]) => {
    const have = state.inventory[id]?.count || 0;
    const ok = have >= n;
    return `<span class="mat-req ${ok?'ok':'fail'}">${getItem(id).icon}${getItem(id).name} ${have}/${n}</span>`;
  }).join('');
  card.innerHTML = `
    <div class="recipe-result" data-rarity="${r.rarity}">
      <div class="recipe-icon">${def.icon}</div>
      <div class="recipe-name">${def.name}</div>
      <span class="item-rarity-label item-rarity-${r.rarity}" style="font-size:10px">${RARITY[r.rarity].label}</span>
    </div>
    <div class="recipe-body">
      <div class="recipe-desc">${r.desc}</div>
      <div class="recipe-mats">${matLines}</div>
      <div class="recipe-meta">需 ${r.coin}💰</div>
    </div>
  `;
  const btn = document.createElement('button');
  btn.className = 'btn-primary recipe-btn';
  btn.textContent = '鍛造';
  btn.disabled = !can;
  btn.onclick = (e) => { e.stopPropagation(); craftRecipe(r.id); };
  card.appendChild(btn);
  return card;
}

function renderForgeTierUp(body) {
  const candidates = tierUpCandidates();
  if (!candidates.length) {

  body.innerHTML = '<div class="forge-hint">3 件同部位同品質 → 1 件高一階（部位隨機）</div>';
  candidates.forEach(c => {
    const nextRarity = RARITY_ORDER[RARITY_ORDER.indexOf(c.rarity)+1];
    const cost = TIER_UP_COIN[c.rarity] || 1000;
    const slotLabel = { head:'頭飾', body:'身袍', weapon:'法器', accessory:'護符' }[c.slot];
    const card = document.createElement('div');
    card.className = 'recipe-card tierup-card';
    const itemIcons = c.items.slice(0,3).map(eq => getItem(eq.itemId).icon).join('');
    card.innerHTML = `
      <div class="recipe-result" data-rarity="${nextRarity}">
        <div class="recipe-icon">⚒️</div>
        <div class="recipe-name">${slotLabel} 升階</div>
        <span class="item-rarity-label item-rarity-${c.rarity}" style="font-size:10px">${RARITY[c.rarity].label}</span>
        <span style="margin:0 6px">→</span>
        <span class="item-rarity-label item-rarity-${nextRarity}" style="font-size:10px">${RARITY[nextRarity].label}</span>
      </div>
      <div class="recipe-body">
        <div class="recipe-desc">材料：${itemIcons}（${c.items.length} 件可用）</div>
        <div class="recipe-meta">需 ${cost}💰</div>
      </div>
    `;
    const btn = document.createElement('button');
    btn.className = 'btn-primary recipe-btn';
    btn.textContent = '升階';
    btn.disabled = state.coins < cost;
    btn.onclick = (e) => { e.stopPropagation(); performTierUp(c); };
    card.appendChild(btn);
    body.appendChild(card);
  });
}

function renderForgeMaterial(body) {
  body.innerHTML = '<div class="forge-hint">把低階素材合成高階素材。</div>';
  MATERIAL_RECIPES.forEach(mr => {
    const inputStr = Object.entries(mr.input).map(([k,v]) => {
      const have = state.inventory[k]?.count || 0;
      const ok = have >= v;
      return `<span class="mat-req ${ok?'ok':'fail'}">${getItem(k).icon}${getItem(k).name} ${have}/${v}</span>`;
    }).join('');
    const outputStr = Object.entries(mr.output).map(([k,v])=>`${getItem(k).icon} ${getItem(k).name} ×${v}`).join('、');
    const can = hasMaterials(mr.input);
    const card = document.createElement('div');
    card.className = 'recipe-card' + (can ? '' : ' disabled');
    card.innerHTML = `
      <div class="recipe-result">
        <div class="recipe-icon">🌀</div>
        <div class="recipe-name">${outputStr}</div>
      </div>
      <div class="recipe-body">
        <div class="recipe-mats">${inputStr}</div>
      </div>
    `;
    const btn = document.createElement('button');
    btn.className = 'btn-primary recipe-btn';
    btn.textContent = '合成';
    btn.disabled = !can;
    btn.onclick = (e) => { e.stopPropagation(); craftMaterial(mr.id); };
    card.appendChild(btn);
    body.appendChild(card);
  });
}

// ============ 音效初始化（首次互動） ============
function ensureAudio() {
  if (!Audio.ctx) { Audio.init(); Audio.startBGM(); }
  Audio.resume();
}

// ============ 事件 ============
function bindEvents() {
  // 任何點擊都先確保 AudioContext 已啟動（瀏覽器自動播放政策）
  document.addEventListener('pointerdown', ensureAudio, { once: false });

  // 全域按鈕點擊音
  document.addEventListener('click', (e) => {
    if (e.target.closest('button')) Audio.click();
  }, true);

  // 標題
  document.getElementById('btn-new-game').onclick = () => { showScreen('select-screen'); renderGhostSelect(); };
  document.getElementById('btn-continue').onclick = () => {
    const saved = load();
    if (!saved || !saved.activeGhostId) { toast('沒有存檔'); return; }
    state = saved;
    // 升級舊存檔：補上魂力欄位
    for (const gid of Object.keys(state.ghosts)) {
      const g = state.ghosts[gid];
      const gDef = getGhost(gid);
      if (g.spirit === undefined) g.spirit = gDef.baseSpirit;
      if (!g.lastTickAt) g.lastTickAt = Date.now();
    }
    for (const eq of state.equipment) { if (eq.enhance === undefined) eq.enhance = 0; }
    if (!state.unlockedRecipes) state.unlockedRecipes = ['r_paperhat', 'r_coppercoin'];
    save();
    showScreen('main-screen');
    renderMain();
  };

  // 主畫面
  document.getElementById('btn-open-map').onclick = () => { renderMapList(); openModal('map-modal'); };
  document.getElementById('btn-claim').onclick = claimDrift;
  document.getElementById('btn-speedup').onclick = speedupDrift;
  document.getElementById('btn-bag').onclick = () => { currentBagTab = 'all'; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab==='all')); renderBag(); openModal('bag-modal'); };
  document.getElementById('btn-ghost-info').onclick = () => { renderGhostModal(); openModal('ghost-modal'); };
  document.getElementById('btn-forge').onclick = () => { currentForgeTab='recipe'; document.querySelectorAll('#forge-tabs .tab').forEach(t=>t.classList.toggle('active', t.dataset.forgetab==='recipe')); renderForge(); openModal('forge-modal'); };
  document.getElementById('btn-menu').onclick = () => openModal('menu-modal');
  document.getElementById('btn-heal').onclick = () => { openHealMenu(); };

  // 戰利品 / 選單
  document.getElementById('btn-close-loot').onclick = () => closeModal('loot-modal');
  document.getElementById('btn-save').onclick = () => { save(); toast('已存檔'); };
  document.getElementById('btn-reset').onclick = () => { if (confirm('確定要重置遊戲嗎？所有進度將消失。')) resetGame(); };

  // 音效設定
  document.getElementById('btn-audio').onclick = () => { closeModal('menu-modal'); renderAudioSettings(); openModal('audio-modal'); };
  document.getElementById('audio-bgm-toggle').onchange = (e) => Audio.setBgmOn(e.target.checked);
  document.getElementById('audio-sfx-toggle').onchange = (e) => Audio.setSfxOn(e.target.checked);
  document.getElementById('audio-bgm-vol').oninput = (e) => Audio.setBgmVol(parseInt(e.target.value)/100);
  document.getElementById('audio-sfx-vol').oninput = (e) => { Audio.setSfxVol(parseInt(e.target.value)/100); };
  document.getElementById('audio-sfx-vol').onchange = () => Audio.tone(660, 0.1, 'sine', 0.2); // 預覽音

  // 關閉
  document.querySelectorAll('[data-close]').forEach(btn => btn.onclick = () => btn.closest('.modal').classList.remove('active'));
  document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('active'); }));

  // 背包分頁
  document.querySelectorAll('#bag-modal .tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('#bag-modal .tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      currentBagTab = t.dataset.tab;
      renderBag();
    };
  });
  // 鍛造分頁
  document.querySelectorAll('#forge-tabs .tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('#forge-tabs .tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      currentForgeTab = t.dataset.forgetab;
      renderForge();
    };
  });
}

function renderAudioSettings() {
  document.getElementById('audio-bgm-toggle').checked = Audio.cfg.bgmOn;
  document.getElementById('audio-sfx-toggle').checked = Audio.cfg.sfxOn;
  document.getElementById('audio-bgm-vol').value = Math.round(Audio.cfg.bgmVol * 100);
  document.getElementById('audio-sfx-vol').value = Math.round(Audio.cfg.sfxVol * 100);
}

// 補血快捷選單
function openHealMenu() {
  const healIds = ['paper_money', 'offering', 'revival_pill'];
  const list = healIds.filter(id => state.inventory[id]?.count > 0);
  if (!list.length) { toast('沒有補血道具'); return; }
  // 簡單做法：依序使用最低階；或彈出選單。這裡彈出選單
  const modal = document.getElementById('heal-modal');
  const body = document.getElementById('heal-list');
  body.innerHTML = '';
  list.forEach(id => {
    const def = getItem(id);
    const inv = state.inventory[id];
    const row = document.createElement('div');
    row.className = 'heal-row';
    row.innerHTML = `
      <div class="heal-icon">${def.icon}</div>
      <div class="heal-info">
        <div class="heal-name">${def.name}</div>
        <div class="heal-meta">+${def.effectValue === 9999 ? '滿' : def.effectValue} 魂力 ・ 剩 ${inv.count}</div>
      </div>
    `;
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.textContent = '使用';
    btn.style.flex = '0 0 auto';
    btn.style.padding = '8px 14px';
    btn.style.margin = '0';
    btn.style.width = 'auto';
    btn.onclick = () => { useHealItem(id); openHealMenu(); };
    row.appendChild(btn);
    body.appendChild(row);
  });
  openModal('heal-modal');
}

// ============ 主迴圈 ============
function tick() {
  if (!state) return;
  spiritTick();
  if (state.drift) renderDrift();
  // 更新魂力 UI
  if (document.getElementById('main-screen').classList.contains('active')) {
    const ghost = activeGhost(); const gDef = activeGhostDef();
    if (ghost && gDef) {
      const max = maxSpirit(ghost, gDef);
      const cur = Math.floor(ghost.spirit);
      const fill = document.getElementById('spirit-fill');
      const text = document.getElementById('spirit-text');
      if (fill && text) {
        fill.style.width = `${max > 0 ? (cur/max*100) : 0}%`;
        text.textContent = `${cur} / ${max}`;
      }
    }
  }
}

// ============ 啟動 ============
function init() {
  Audio.loadCfg();
  bindEvents();
  const saved = load();
  if (saved && saved.activeGhostId) {
    state = saved;
    // 舊存檔遷移
    for (const gid of Object.keys(state.ghosts)) {
      const g = state.ghosts[gid];
      const gDef = getGhost(gid);
      if (g.spirit === undefined && gDef) g.spirit = gDef.baseSpirit;
      if (!g.lastTickAt) g.lastTickAt = Date.now();
    }
    for (const eq of state.equipment) { if (eq.enhance === undefined) eq.enhance = 0; }
    if (!state.unlockedRecipes) state.unlockedRecipes = ['r_paperhat', 'r_coppercoin'];
    showScreen('main-screen');
    renderMain();
  } else {
    state = defaultState();
    showScreen('title-screen');
  }
  setInterval(tick, 500);
  // 每 10 秒自動存檔
  setInterval(() => state && save(), 10000);
}

init();

</script>
