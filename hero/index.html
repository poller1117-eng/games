<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>幽靈勇者 · 合成放置 RPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="game">

  <!-- ============== HUD ============== -->
  <header id="hud">
    <div class="hud-left">
      <div class="resource"><span class="ico">💰</span><span id="goldText">0</span></div>
      <div class="resource"><span class="ico">💎</span><span id="crystalText">0</span></div>
    </div>
    <div class="hud-center">
      <div class="dungeon-name" id="dungeonName">幽冥森林</div>
      <div class="dungeon-stage" id="dungeonStage">1-1</div>
    </div>
    <div class="hud-right">
      <button class="icon-btn" id="btnMute" title="靜音切換">🔊</button>
      <button class="icon-btn" id="btnMenu">☰</button>
    </div>
  </header>

  <!-- ============== 戰鬥場景 ============== -->
  <section id="battleSection">
    <canvas id="battleCanvas"></canvas>

    <div class="enemy-info" id="enemyInfo">
      <div class="enemy-name" id="enemyName">史萊姆</div>
      <div class="enemy-hpbar">
        <div class="enemy-hpfill" id="enemyHPFill"></div>
        <div class="enemy-hptext" id="enemyHPText">100 / 100</div>
      </div>
      <div class="enemy-kills" id="enemyKills">擊殺 0 / 5</div>
    </div>

    <div class="hero-info" id="heroInfo">
      <div class="hero-name">
        <span id="heroClassName">幽冥騎士</span>
        <span class="class-btn" id="btnClass" title="切換職業">🎭</span>
        <span class="hero-shield hidden" id="heroShield">🛡 0.0s</span>
      </div>
      <div class="hero-hpbar">
        <div class="hero-hpfill" id="heroHPFill"></div>
        <div class="hero-hptext" id="heroHPText">100 / 100</div>
      </div>
    </div>

    <div class="floating-rewards" id="floatRewards"></div>
  </section>

  <!-- ============== 裝備欄 + 等級 ============== -->
  <section id="equipmentSection">
    <div id="equipmentRow"></div>
    <div class="level-block">
      <div class="level-text" id="levelText">Lv.1</div>
      <div class="exp-bar"><div class="exp-fill" id="expFill"></div></div>
      <div class="exp-text" id="expText">0 / 50</div>
    </div>
  </section>

  <!-- ============== 技能 + 補血藥 ============== -->
  <section id="skillSection">
    <div id="skillRow"></div>
    <div id="potionRow"></div>
  </section>

  <!-- ============== 屬性條 ============== -->
  <section id="statsBar">
    <div class="stat"><span class="lbl">⚔</span><span class="val" id="statATK">10</span></div>
    <div class="stat"><span class="lbl">🛡</span><span class="val" id="statDEF">0</span></div>
    <div class="stat"><span class="lbl">❤</span><span class="val" id="statHP">100</span></div>
    <div class="stat"><span class="lbl">⚡</span><span class="val" id="statSPD">1.0</span></div>
    <div class="stat"><span class="lbl">🎯</span><span class="val" id="statCRIT">5%</span></div>
    <div class="stat dps"><span class="lbl">DPS</span><span class="val" id="statDPS">10</span></div>
  </section>

  <!-- ============== 背包 ============== -->
  <section id="inventorySection">
    <div class="section-title">
      <span>🎒 背包 · 拖曳合成 · 雙擊穿戴</span>
      <div class="inv-tools">
        <button class="mini-btn" id="btnSort" title="按類型階級排序">🗂</button>
        <button class="mini-btn" id="btnAutoMerge" title="自動合成所有同階">✨</button>
        <button class="mini-btn" id="btnAutoEquip" title="自動穿戴最強">⚔</button>
        <button class="mini-btn warn" id="btnSellLow" title="賣出 T1-T3 垃圾">💰</button>
      </div>
    </div>
    <div id="inventoryGrid"></div>
  </section>

  <!-- ============== 操作按鈕 ============== -->
  <section id="actions">
    <button class="action-btn primary" id="btnSummon">
      <span class="ico">🎁</span><span class="lbl">召喚</span>
      <span class="cost"><span id="summonCost">100</span>💰</span>
    </button>
    <button class="action-btn" id="btnSummon10">
      <span class="ico">📦</span><span class="lbl">十連</span>
      <span class="cost"><span id="summonCost10">900</span>💰</span>
    </button>
    <button class="action-btn" id="btnShop">
      <span class="ico">🏪</span><span class="lbl">商店</span>
    </button>
    <button class="action-btn" id="btnDungeon">
      <span class="ico">🗺</span><span class="lbl">地城</span>
    </button>
  </section>

</div>

<!-- ============== 召喚動畫 ============== -->
<div id="summonOverlay" class="overlay hidden">
  <div class="summon-stage"></div>
</div>

<!-- ============== 地城選單 ============== -->
<div id="dungeonModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span>🗺 選擇地城</span>
      <button class="close-btn" data-close="dungeonModal">✕</button>
    </div>
    <div class="modal-body">
      <div id="dungeonList"></div>
    </div>
  </div>
</div>

<!-- ============== 職業選擇 ============== -->
<div id="classModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span>🎭 選擇職業</span>
      <button class="close-btn" data-close="classModal">✕</button>
    </div>
    <div class="modal-body" id="classBody"></div>
  </div>
</div>

<!-- ============== 商店 ============== -->
<div id="shopModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span>🏪 商店</span>
      <button class="close-btn" data-close="shopModal">✕</button>
    </div>
    <div class="modal-body" id="shopBody"></div>
  </div>
</div>

<!-- ============== 選單 ============== -->
<div id="menuModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span>☰ 選單</span>
      <button class="close-btn" data-close="menuModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="sound-section">
        <div class="sound-title">🎵 音效設定</div>
        <div class="sound-row">
          <button class="sound-btn" id="btnToggleSfx">🔊 音效 開</button>
          <input type="range" class="sound-slider" id="sfxVolume" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="sound-row">
          <button class="sound-btn" id="btnToggleBgm">🎵 音樂 開</button>
          <input type="range" class="sound-slider" id="bgmVolume" min="0" max="1" step="0.05" value="0.35">
        </div>
      </div>
      <button class="menu-item" id="btnSave">💾 立即存檔</button>
      <button class="menu-item" id="btnReset">🔄 重置遊戲</button>
      <div class="menu-info">
        版本 v3.0 · 含音效音樂<br>
        自動存檔 · 離線最多 12 小時收益<br>
        補血藥 HP &lt; 30% 自動使用<br>
        首次點擊頁面後音效才會啟動（瀏覽器限制）
      </div>
    </div>
  </div>
</div>

<!-- ============== 離線獎勵彈窗 ============== -->
<div id="offlineModal" class="modal hidden">
  <div class="modal-box offline-box">
    <div class="modal-header center">
      <span>👻 主人，歡迎回來</span>
    </div>
    <div class="modal-body center">
      <div class="offline-time" id="offlineTime">離線 0 分鐘</div>
      <div class="offline-rewards">
        <div class="offline-row"><span>💰 靈幣</span><span id="offlineGold">+0</span></div>
        <div class="offline-row"><span>⚔ 擊殺</span><span id="offlineKills">+0</span></div>
        <div class="offline-row"><span>⭐ 經驗</span><span id="offlineExp">+0</span></div>
        <div class="offline-row" id="offlineDropsRow"><span>🎁 掉落</span><span id="offlineDrops">無</span></div>
      </div>
      <button class="action-btn primary" id="btnClaimOffline">領取獎勵</button>
    </div>
  </div>
</div>

<!-- ============== Toast ============== -->
<div id="toastContainer"></div>

<!-- ============== 拖曳虛影 ============== -->
<div id="dragGhost" class="hidden"></div>

<script src="sound.js"></script>
<script src="game.js"></script>
</body>
</html>
