<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幽靈密境 — Ghost Sanctum</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<style>
  :root{
    --c-bg:#0a0518;
    --c-deep:#1A0D3A;
    --c-stone:#4A7C8E;
    --c-glow:#00FFCC;
    --c-danger:#C0392B;
    --c-fire:#FF8C42;
    --c-water:#4FC3F7;
    --c-wind:#B2EBC8;
    --c-dark:#8E44AD;
    --c-light:#FFD54F;
    --c-paper:#e8d9b0;
    --c-ink:#1a1228;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:radial-gradient(ellipse at center, #1A0D3A 0%, #0a0518 70%, #000 100%);
    font-family:"Noto Serif TC","Microsoft JhengHei",serif;
    color:#e8d9b0;
    touch-action:none;
  }
  #stage{position:relative;width:100vw;height:100vh;overflow:hidden;}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}

  /* ====== HUD ====== */
  #hud{position:absolute;inset:0;pointer-events:none;z-index:5;}
  .hud-corner{position:absolute;padding:10px 14px;font-size:13px;}
  #hud-top-left{top:0;left:0;display:flex;flex-direction:column;gap:6px;}
  #hud-top-right{top:0;right:0;text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  .bar{
    width:170px;height:12px;border:1px solid rgba(232,217,176,.6);
    background:rgba(0,0,0,.45);position:relative;border-radius:2px;
    box-shadow:0 0 12px rgba(0,255,204,.15);
  }
  .bar-fill{height:100%;transition:width .25s ease;border-radius:1px;}
  #hp-fill{background:linear-gradient(90deg,#ff5577,#ff99aa);}
  #soul-fill{background:linear-gradient(90deg,#00FFCC,#9bffe5);box-shadow:0 0 10px #00FFCC;}
  .bar-label{font-size:11px;letter-spacing:1px;color:#e8d9b0;text-shadow:0 0 6px #000;}
  #element-display{
    display:flex;gap:6px;align-items:center;margin-top:4px;
    background:rgba(0,0,0,.5);padding:6px 10px;border-radius:18px;
    border:1px solid rgba(0,255,204,.35);font-size:13px;
  }
  .el-chip{
    width:22px;height:22px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:bold;color:#000;
    box-shadow:0 0 8px currentColor;
  }
  #coin-display{
    background:rgba(0,0,0,.55);padding:6px 12px;border-radius:14px;
    border:1px solid rgba(255,213,79,.5);color:#FFD54F;
    font-weight:bold;letter-spacing:1px;pointer-events:auto;
    cursor:pointer;
  }
  #area-name{
    font-family:"ZCOOL QingKe HuangYou","Noto Serif TC",serif;
    font-size:22px;letter-spacing:8px;color:#e8d9b0;
    text-shadow:0 0 12px #00FFCC, 0 2px 6px #000;
    opacity:0;transition:opacity 1s ease;
  }
  #area-name.show{opacity:1;}

  /* ====== Touch controls ====== */
  #touch-controls{position:absolute;inset:0;pointer-events:none;z-index:6;}
  .tc-btn{
    position:absolute;pointer-events:auto;
    border:2px solid rgba(0,255,204,.4);
    background:radial-gradient(circle at 30% 30%, rgba(0,255,204,.18), rgba(0,0,0,.55));
    color:#e8d9b0;font-weight:bold;
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);
    transition:transform .08s, background .12s;
  }
  .tc-btn:active{transform:scale(.92);background:radial-gradient(circle at 30% 30%, rgba(0,255,204,.55), rgba(0,0,0,.6));}
  #joy{
    left:18px;bottom:18px;width:130px;height:130px;border-radius:50%;
    position:absolute;pointer-events:auto;
    border:2px solid rgba(0,255,204,.35);
    background:radial-gradient(circle, rgba(0,255,204,.08), rgba(0,0,0,.5));
  }
  #joy-stick{
    position:absolute;left:50%;top:50%;width:55px;height:55px;
    margin-left:-27px;margin-top:-27px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#9bffe5,#00FFCC 60%,#005544);
    box-shadow:0 0 12px #00FFCC;
    pointer-events:none;
  }
  #btn-a{right:20px;bottom:120px;width:70px;height:70px;border-radius:50%;font-size:18px;}
  #btn-b{right:100px;bottom:60px;width:70px;height:70px;border-radius:50%;font-size:18px;}
  #btn-c{right:20px;bottom:40px;width:60px;height:60px;border-radius:50%;font-size:14px;}
  #btn-swap{right:115px;bottom:140px;width:54px;height:54px;border-radius:50%;font-size:11px;}
  #btn-map{left:18px;top:60vh;width:50px;height:50px;border-radius:50%;font-size:11px;}

  /* ====== Modals ====== */
  .modal{
    position:absolute;inset:0;z-index:30;
    display:none;align-items:center;justify-content:center;
    background:rgba(2,1,8,.78);
    backdrop-filter:blur(6px);
  }
  .modal.show{display:flex;}
  .panel{
    width:min(92vw,520px);max-height:88vh;overflow-y:auto;
    background:linear-gradient(180deg, rgba(232,217,176,.97), rgba(212,194,150,.97));
    color:var(--c-ink);
    border:2px solid #6a4a1c;border-radius:6px;
    box-shadow:0 18px 60px rgba(0,0,0,.7), inset 0 0 60px rgba(106,74,28,.15);
    padding:20px 22px;
    background-image:
      radial-gradient(circle at 10% 5%, rgba(106,74,28,.12), transparent 30%),
      radial-gradient(circle at 90% 80%, rgba(106,74,28,.1), transparent 30%);
  }
  .panel h2{
    font-family:"ZCOOL QingKe HuangYou","Noto Serif TC",serif;
    text-align:center;letter-spacing:10px;font-size:24px;
    color:#3a1f0a;margin-bottom:6px;
  }
  .panel .sub{text-align:center;font-size:12px;letter-spacing:3px;color:#6a4a1c;margin-bottom:14px;}
  .shop-item{
    display:flex;align-items:center;gap:10px;padding:10px;
    border:1px solid rgba(106,74,28,.35);border-radius:4px;
    background:rgba(255,250,235,.45);
    margin-bottom:8px;
  }
  .shop-icon{
    width:46px;height:46px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0;
    background:linear-gradient(135deg,#1A0D3A,#4A7C8E);
    box-shadow:inset 0 0 8px rgba(0,255,204,.4);
  }
  .shop-info{flex:1;}
  .shop-name{font-weight:bold;font-size:14px;color:#3a1f0a;}
  .shop-desc{font-size:11px;color:#5a3f1a;line-height:1.4;margin-top:2px;}
  .shop-buy{
    background:linear-gradient(180deg,#3a1f0a,#1a0d05);color:#FFD54F;
    border:1px solid #6a4a1c;padding:7px 12px;border-radius:4px;
    font-weight:bold;font-size:12px;letter-spacing:1px;cursor:pointer;
    box-shadow:0 2px 0 #1a0d05;
  }
  .shop-buy:hover{filter:brightness(1.15);}
  .shop-buy:disabled{opacity:.45;cursor:not-allowed;}
  .shop-buy.owned{background:#3a5a3a;color:#cfeacf;}
  .close-btn{
    position:absolute;top:8px;right:12px;font-size:20px;
    color:#3a1f0a;cursor:pointer;font-weight:bold;
    background:none;border:none;
  }
  .panel-tabs{display:flex;gap:6px;margin-bottom:10px;border-bottom:1px solid rgba(106,74,28,.4);}
  .ptab{
    flex:1;text-align:center;padding:8px;cursor:pointer;
    font-size:12px;letter-spacing:2px;color:#6a4a1c;
    border-bottom:2px solid transparent;
  }
  .ptab.active{color:#3a1f0a;border-color:#3a1f0a;background:rgba(255,250,235,.4);}

  /* ====== Map ====== */
  #map-canvas{
    width:100%;height:340px;background:rgba(255,250,235,.5);
    border:1px solid rgba(106,74,28,.5);border-radius:4px;
    image-rendering:pixelated;
  }
  .map-legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:#5a3f1a;margin-top:6px;flex-wrap:wrap;}
  .lg-chip{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle;}

  /* ====== Title screen ====== */
  #title-screen{
    position:absolute;inset:0;z-index:50;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at center, rgba(26,13,58,.6) 0%, rgba(10,5,24,1) 80%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/></svg>");
    text-align:center;padding:20px;
  }
  #title-screen h1{
    font-family:"ZCOOL QingKe HuangYou","Noto Serif TC",serif;
    font-size:54px;letter-spacing:20px;
    color:#e8d9b0;
    text-shadow:
      0 0 18px #00FFCC,
      0 0 36px rgba(0,255,204,.6),
      0 4px 0 #1A0D3A,
      0 6px 12px #000;
    margin-bottom:10px;
    animation:ghost-float 4s ease-in-out infinite;
  }
  @keyframes ghost-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  #title-screen .sub-title{
    font-size:14px;letter-spacing:8px;color:rgba(0,255,204,.85);
    margin-bottom:30px;
  }
  #title-screen .ghost-ill{
    width:140px;height:160px;margin-bottom:18px;position:relative;
  }
  .start-btn{
    background:linear-gradient(180deg, rgba(0,255,204,.2), rgba(0,255,204,.05));
    color:#e8d9b0;border:2px solid #00FFCC;
    padding:14px 36px;font-size:18px;letter-spacing:8px;
    font-family:"ZCOOL QingKe HuangYou","Noto Serif TC",serif;
    cursor:pointer;border-radius:2px;
    box-shadow:0 0 24px rgba(0,255,204,.3);
    transition:all .2s;
  }
  .start-btn:hover{background:rgba(0,255,204,.25);box-shadow:0 0 36px rgba(0,255,204,.6);}
  .credits{position:absolute;bottom:14px;font-size:10px;color:rgba(232,217,176,.4);letter-spacing:2px;}

  /* ====== Toast ====== */
  #toast{
    position:absolute;left:50%;top:18%;transform:translateX(-50%);
    background:rgba(10,5,24,.92);
    border:1px solid #00FFCC;
    color:#00FFCC;padding:10px 22px;border-radius:2px;
    font-size:14px;letter-spacing:3px;z-index:25;
    opacity:0;transition:opacity .4s, transform .4s;
    pointer-events:none;
    box-shadow:0 0 24px rgba(0,255,204,.4);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ====== Dialog ====== */
  #dialog{
    position:absolute;left:50%;bottom:14%;transform:translateX(-50%);
    width:min(86vw,560px);
    background:rgba(10,5,24,.92);
    border:2px solid #6a4a1c;border-radius:4px;
    padding:14px 18px;color:#e8d9b0;
    font-size:14px;line-height:1.6;letter-spacing:1px;
    box-shadow:0 0 24px rgba(0,0,0,.7);
    display:none;z-index:20;
  }
  #dialog .dname{color:#00FFCC;font-weight:bold;margin-bottom:4px;letter-spacing:2px;font-size:13px;}
  #dialog .dhint{color:rgba(232,217,176,.5);font-size:11px;margin-top:6px;text-align:right;}

  @media (min-width:900px){
    #touch-controls{display:none;}
    .bar{width:220px;height:14px;}
    .hud-corner{font-size:14px;}
  }

  /* ====== Particle hint ====== */
  .pulse-hint{
    position:absolute;width:8px;height:8px;border-radius:50%;
    background:#00FFCC;box-shadow:0 0 12px #00FFCC;
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.9;}50%{transform:scale(2);opacity:.3;}}
</style>
</head>
<body>
<div id="stage">

  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-top-left" class="hud-corner">
      <div class="bar-label">靈　力　HP</div>
      <div class="bar"><div id="hp-fill" class="bar-fill" style="width:100%"></div></div>
      <div class="bar-label">靈　能　SP</div>
      <div class="bar"><div id="soul-fill" class="bar-fill" style="width:0%"></div></div>
      <div id="element-display">
        <span style="font-size:11px;letter-spacing:2px;color:#c9bf9b;">屬性</span>
        <span class="el-chip" id="el-1" style="background:#444;color:#999;">—</span>
        <span class="el-chip" id="el-2" style="background:#444;color:#999;">—</span>
      </div>
    </div>
    <div id="hud-top-right" class="hud-corner">
      <div id="coin-display" onclick="UI.openShop()">⛧ <span id="coin-amt">0</span> 靈幣</div>
      <div id="area-name">入口迴廊</div>
      <div style="font-size:11px;color:rgba(232,217,176,.55);letter-spacing:2px;">幽靈密境 v1.0</div>
    </div>
  </div>

  <!-- Touch controls (mobile) -->
  <div id="touch-controls">
    <div id="joy"><div id="joy-stick"></div></div>
    <button id="btn-a" class="tc-btn" data-key="jump">跳</button>
    <button id="btn-b" class="tc-btn" data-key="attack">攻擊</button>
    <button id="btn-c" class="tc-btn" data-key="skill">技</button>
    <button id="btn-swap" class="tc-btn" data-key="swap">切換</button>
    <button id="btn-map" class="tc-btn" data-key="map">地圖</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Dialog -->
  <div id="dialog">
    <div class="dname" id="d-name">阿幽</div>
    <div id="d-text"></div>
    <div class="dhint">▼ 點擊任意處繼續</div>
  </div>

  <!-- Shop Modal -->
  <div id="modal-shop" class="modal" onclick="if(event.target.id==='modal-shop')UI.closeShop();">
    <div class="panel">
      <button class="close-btn" onclick="UI.closeShop()">✕</button>
      <h2>幽靈商城</h2>
      <div class="sub">Ghost Sanctum Boutique</div>
      <div class="panel-tabs">
        <div class="ptab active" data-tab="cos" onclick="UI.shopTab('cos')">皮膚外觀</div>
        <div class="ptab" data-tab="util" onclick="UI.shopTab('util')">便利道具</div>
        <div class="ptab" data-tab="pass" onclick="UI.shopTab('pass')">通行證</div>
      </div>
      <div id="shop-content"></div>
      <div style="text-align:center;margin-top:10px;font-size:11px;color:#5a3f1a;">
        ※ 所有付費道具不影響核心關卡平衡 ※
      </div>
    </div>
  </div>

  <!-- Map Modal -->
  <div id="modal-map" class="modal" onclick="if(event.target.id==='modal-map')UI.closeMap();">
    <div class="panel">
      <button class="close-btn" onclick="UI.closeMap()">✕</button>
      <h2>神殿古卷</h2>
      <div class="sub">Sanctum Cartograph</div>
      <canvas id="map-canvas" width="480" height="320"></canvas>
      <div class="map-legend">
        <span><span class="lg-chip" style="background:#3a1f0a;"></span>已探索</span>
        <span><span class="lg-chip" style="background:#c0392b;"></span>當前位置</span>
        <span><span class="lg-chip" style="background:rgba(106,74,28,.3);border:1px dashed #6a4a1c;"></span>未探索</span>
        <span><span class="lg-chip" style="background:#FFD54F;"></span>Boss</span>
      </div>
      <div style="font-size:12px;color:#5a3f1a;margin-top:8px;text-align:center;letter-spacing:2px;">
        靈能組合 <span id="map-el-status">無</span> ｜ 已探索 <span id="map-rooms">0</span> 房間
      </div>
    </div>
  </div>

  <!-- Title -->
  <div id="title-screen">
    <div class="ghost-ill">
      <svg viewBox="0 0 140 160" width="140" height="160">
        <defs>
          <radialGradient id="ghostGlow" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#9bffe5" stop-opacity=".9"/>
            <stop offset="60%" stop-color="#00FFCC" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#1A0D3A" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e8d9b0"/>
            <stop offset="100%" stop-color="#4A7C8E" stop-opacity=".4"/>
          </linearGradient>
        </defs>
        <ellipse cx="70" cy="80" rx="70" ry="80" fill="url(#ghostGlow)"/>
        <path d="M 70 30 Q 30 30 30 80 L 30 130 Q 40 120 50 130 Q 60 120 70 130 Q 80 120 90 130 Q 100 120 110 130 L 110 80 Q 110 30 70 30 Z" fill="url(#robe)" opacity=".95"/>
        <circle cx="58" cy="68" r="3" fill="#1A0D3A"/>
        <circle cx="82" cy="68" r="3" fill="#1A0D3A"/>
        <path d="M 62 82 Q 70 87 78 82" stroke="#1A0D3A" stroke-width="1.5" fill="none"/>
        <path d="M 70 22 Q 60 14 50 18 Q 55 24 62 26 Z" fill="#00FFCC" opacity=".7"/>
        <path d="M 70 22 Q 80 14 90 18 Q 85 24 78 26 Z" fill="#00FFCC" opacity=".7"/>
      </svg>
    </div>
    <h1>幽靈密境</h1>
    <div class="sub-title">GHOST SANCTUM</div>
    <button class="start-btn" onclick="Game.start()">進　入　神　殿</button>
    <div class="credits">© 維基遊戲日選 2026.05.28 ｜ Metroidvania H5</div>
  </div>

</div>

<script>
/* ===========================================================
   《幽靈密境》— H5 Metroidvania
   依據《幽靈密境企劃書》v2026-05-28 製作
   核心：靈能汲取 × 能力解鎖探索 × 商城溫和付費
   =========================================================== */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

function resize(){
  DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  canvas.width = window.innerWidth * DPR;
  canvas.height = window.innerHeight * DPR;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

/* -------------------- World Data -------------------- */
const ELEMENTS = {
  fire: {name:'火', color:'#FF8C42', symbol:'火'},
  water:{name:'水', color:'#4FC3F7', symbol:'水'},
  wind: {name:'風', color:'#B2EBC8', symbol:'風'},
  dark: {name:'暗', color:'#8E44AD', symbol:'暗'},
  light:{name:'光', color:'#FFD54F', symbol:'光'},
};

const ROOMS = [
  // 入口迴廊
  {id:0,name:'入口迴廊',area:'entrance',col:0,row:1,bg:'entrance',
   platforms:[
     {x:0,y:520,w:1200,h:80},
     {x:280,y:430,w:140,h:18},
     {x:520,y:360,w:140,h:18},
     {x:760,y:430,w:140,h:18},
     {x:1000,y:340,w:200,h:18},
   ],
   enemies:[{x:340,y:400,type:'wisp',el:'dark'},{x:820,y:400,type:'wisp',el:'light'}],
   exits:{right:1}, hint:'右→ 水鏡祭廳'},
  // 水鏡祭廳
  {id:1,name:'水鏡祭廳',area:'water',col:1,row:1,bg:'water',
   platforms:[
     {x:0,y:520,w:300,h:80},
     {x:400,y:520,w:200,h:80},
     {x:700,y:520,w:500,h:80},
     {x:260,y:400,w:140,h:18},
     {x:500,y:330,w:160,h:18},
     {x:780,y:280,w:140,h:18},
     {x:1020,y:200,w:160,h:18,locked:'wind'},
   ],
   enemies:[{x:540,y:280,type:'sprite',el:'water'},{x:820,y:230,type:'sprite',el:'water'},{x:880,y:480,type:'wisp',el:'water'}],
   pickups:[{x:140,y:470,type:'soulOrb'}],
   exits:{left:0,right:2,up:5}, hint:'★ 擊敗水靈→獲得「水」靈能'},
  // 焰獄鍛造間 (need water)
  {id:2,name:'焰獄鍛造間',area:'fire',col:2,row:1,bg:'fire',gate:'water',
   platforms:[
     {x:0,y:520,w:400,h:80},
     {x:480,y:520,w:120,h:80,hot:true},
     {x:680,y:520,w:520,h:80},
     {x:260,y:420,w:140,h:18},
     {x:460,y:340,w:140,h:18,hot:true},
     {x:720,y:260,w:140,h:18},
     {x:980,y:180,w:200,h:18},
   ],
   enemies:[{x:340,y:400,type:'wisp',el:'fire'},{x:760,y:230,type:'sprite',el:'fire'},{x:1000,y:150,type:'sprite',el:'fire'}],
   pickups:[{x:1080,y:140,type:'jar'}],
   exits:{left:1,right:3}, hint:'★ 擊敗火靈→獲得「火」靈能 ★ 隱藏茶杯+攻擊'},
  // 暗林靈苑 (need fire)
  {id:3,name:'暗林靈苑',area:'dark',col:3,row:1,bg:'dark',gate:'fire',

/* -------------------- Game State -------------------- */
const Game = {
  state:'title',
  roomId:0,
  player:null,
  enemies:[],
  particles:[],
  pickups:[],
  projectiles:[],
  exits:[],
  rooms:{},
  visited:new Set(),
  unlockedEl:new Set(),
  abilities:new Set(),   // 'water','fire','dark','wind'
  elements:[null,null],  // currently equipped (2 slots)
  coins:0,
  bossDefeated:false,
  cameraX:0,
  shake:0,
  hp:5,maxHp:5,
  soul:0,maxSoul:100,
  inv:{revive:0,orbX2:false,markerPack:false,memoSkin:false,monthly:false,season:false,collect:false},
  ownedSkins:new Set(['skin_default']),
  equippedSkin:'skin_default',
  start(){
    document.getElementById('title-screen').style.display='none';
    this.state='playing';
    this.player = new Player(120,400);
    this.loadRoom(0);
    UI.showArea('入口迴廊');
    UI.toast('歡迎來到幽靈密境');
    setTimeout(()=>{
      UI.dialog('阿幽','……我，死了？這裡是哪兒……一座古老的神殿……試著探索看看吧。');
    },1200);
    Loop.start();
  },
  loadRoom(id){
    this.roomId=id;
    const r=ROOMS[id];
    if(!r){ console.warn('Room missing',id); return; }
    if(r.gate && !this.abilities.has(r.gate)){
      UI.toast('封印之門 — 需要「'+ELEMENTS[r.gate].name+'」靈能');
      // bounce back: just keep current; do not switch
      return false;
    }
    this.enemies = (r.enemies||[]).map(e=>new Enemy(e.x,e.y,e.type,e.el,e.hp,e.name));
    this.pickups = (r.pickups||[]).map(p=>({...p, picked:false}));
    this.projectiles = [];
    this.particles = [];
    this.cameraX = 0;
    this.bossDefeated = false;
    this.visited.add(id);
    if(id!==0) UI.showArea(r.name);
    return true;
  },
  changeRoom(dir){
    const cur = ROOMS[this.roomId];
    if(!cur.exits || cur.exits[dir]===undefined) return;
    const newId = cur.exits[dir];
    const newRoom = ROOMS[newId];
    if(newRoom.gate && !this.abilities.has(newRoom.gate)){
      UI.toast('封印之門 — 需要「'+ELEMENTS[newRoom.gate].name+'」靈能');
      return;
    }
    if(!this.loadRoom(newId)) return;
    // reposition player
    if(dir==='right') this.player.x = 40;
    else if(dir==='left') this.player.x = 1140;
    else if(dir==='up'){ this.player.x=600; this.player.y=480; }
    else if(dir==='down'){ this.player.x=600; this.player.y=40; }
    this.player.vx=0; this.player.vy=0;
  },
  takeDamage(amt){
    if(this.player.invuln>0) return;
    this.hp -= amt;
    this.player.invuln = 60;
    this.shake = 8;
    UI.updateHUD();
    if(this.hp<=0){
      if(this.inv.revive>0){
        this.inv.revive--;
        this.hp = this.maxHp;
        this.player.invuln = 180;
        UI.toast('復活之泉 — 死灰復燃');
      } else {
        this.hp = this.maxHp;
        this.loadRoom(0);
        this.player.x=120;this.player.y=400;
        UI.toast('靈魂回歸神殿入口');
      }
      UI.updateHUD();
    }
  },
  gainSoul(amt,el){
    this.soul = Math.min(this.maxSoul, this.soul+amt);
    if(el && !this.unlockedEl.has(el)){
      this.unlockedEl.add(el);
      // first absorption — auto-equip first 2
      if(!this.elements[0]) this.elements[0]=el;
      else if(!this.elements[1] && this.elements[0]!==el) this.elements[1]=el;
      if(['water','fire','dark','wind'].includes(el) && !this.abilities.has(el)){
        this.abilities.add(el);
        UI.toast('★ 解鎖「'+ELEMENTS[el].name+'」靈能能力');
        if(el==='water') UI.dialog('阿幽','水的靈能——我能在這神殿中操控水流，前進深處了。');
        if(el==='fire')  UI.dialog('阿幽','炙熱的火靈……熔岩之牆似乎也擋不住我了。');
        if(el==='dark')  UI.dialog('阿幽','暗影包覆著我……可以穿越某些壁壘。');
        if(el==='wind')  UI.dialog('阿幽','風……自由了。我終於能離開這座神殿了嗎？');
      }
    }
    UI.updateHUD();
  },
  gainCoin(amt){ this.coins+=amt; UI.updateHUD(); },
  win(){
    this.state='win';
    UI.dialog('神諭','你解開了神殿七封之一……（試玩版完。完整版含 7 大區域、最終 Boss 與真結局。）');
    setTimeout(()=>{
      UI.toast('恭喜通關試玩版！');
    },800);
  },
};

/* -------------------- Entities -------------------- */
class Player{
  constructor(x,y){
    this.x=x;this.y=y;this.vx=0;this.vy=0;
    this.w=24;this.h=36;
    this.facing=1;this.onGround=false;
    this.canDoubleJump=true;
    this.attacking=0;
    this.invuln=0;
    this.float=0;
  }
  update(){
    this.float += 0.08;
    const move = (Input.right?1:0) - (Input.left?1:0);
    const accel = this.onGround?0.6:0.4;
    this.vx += move*accel;
    this.vx *= 0.84;
    if(move!==0) this.facing = move;

    // jump
    if(Input.jumpPressed){
      if(this.onGround){ this.vy=-11; this.onGround=false; this.canDoubleJump=true; }
      else if(this.canDoubleJump && Game.abilities.has('dark')){
        this.vy=-10; this.canDoubleJump=false;
        Game.particles.push(...spawnBurst(this.x+this.w/2,this.y+this.h,'#8E44AD',8));
      }
      Input.jumpPressed=false;
    }

    // attack
    if(Input.attackPressed && this.attacking<=0){
      this.attacking = 18;
      this.attackDealt = false;
      Input.attackPressed=false;
    }

    // skill (cost SP)
    if(Input.skillPressed && Game.soul>=25){
      this.castSkill();
      Game.soul -= 25;
      UI.updateHUD();
      Input.skillPressed=false;
    } else if(Input.skillPressed){
      UI.toast('靈能不足');
      Input.skillPressed=false;
    }

    // gravity
    this.vy += 0.55;
    if(this.vy>14) this.vy=14;

    // movement & collision
    this.x += this.vx;
    this.collide('x');
    this.y += this.vy;
    this.onGround=false;
    this.collide('y');

    if(this.attacking>0) this.attacking--;
    if(this.invuln>0) this.invuln--;

    // pickups
    for(const p of Game.pickups){
      if(p.picked) continue;
      const dx=(this.x+12)-(p.x+8), dy=(this.y+18)-(p.y+8);
      if(dx*dx+dy*dy<700){
        p.picked=true;
        if(p.type==='soulOrb'){ Game.maxHp += 1; Game.hp = Math.min(Game.maxHp,Game.hp+2); UI.toast('★ 靈珠 — 最大靈力+1'); }
        else if(p.type==='jar'){ Game.gainCoin(50); UI.toast('★ 骨瓷茶杯 — 靈幣+50'); }
        Game.particles.push(...spawnBurst(p.x+8,p.y+8,'#FFD54F',14));
      }
    }

    // room exits
    if(this.x<0){ Game.changeRoom('left'); }
    else if(this.x>1180){ Game.changeRoom('right'); }
    if(this.y<-10){ Game.changeRoom('up'); }
    else if(this.y>620){ Game.changeRoom('down'); }

    // attack hitbox
    if(this.attacking>10 && !this.attackDealt){
      const hb={x:this.x+(this.facing>0?20:-30), y:this.y+8, w:36, h:24};
      for(const e of Game.enemies){
        if(e.dead) continue;
        if(rectOverlap(hb,{x:e.x,y:e.y,w:e.w,h:e.h})){
          const el = Game.elements;
          let dmg = 1;
          if(el.includes(e.el)) dmg = 2;       // type match
          if(el[0]&&el[1]&&el[0]!==el[1]) dmg += 1; // dual element bonus
          e.takeDamage(dmg,this.facing);
          this.attackDealt = true;
          Game.shake = 3;
        }
      }
    }

    // hot platform damage
    for(const p of (ROOMS[Game.roomId].platforms||[])){
      if(p.hot && !Game.abilities.has('water')){
        if(this.y+this.h>p.y-1 && this.y+this.h<p.y+8 && this.x+this.w>p.x && this.x<p.x+p.w){
          Game.takeDamage(1);
        }
      }
    }
  }
  castSkill(){
    const el = Game.elements;
    if(!el[0]){ UI.toast('未裝備靈能屬性'); return; }
    const primary = el[0];
    const dir = this.facing;
    if(primary==='fire'){
      // fireball
      Game.projectiles.push({x:this.x+12,y:this.y+12,vx:dir*8,vy:0,life:60,color:'#FF8C42',el:'fire'});
      Game.particles.push(...spawnBurst(this.x+12,this.y+12,'#FF8C42',10));
    } else if(primary==='water'){
      // water wave AoE
      for(let i=0;i<4;i++) Game.projectiles.push({x:this.x+12+dir*i*12,y:this.y+18+i*2,vx:dir*5,vy:1,life:40,color:'#4FC3F7',el:'water'});
    } else if(primary==='dark'){
      // shadow strike
      Game.projectiles.push({x:this.x+12,y:this.y+12,vx:dir*10,vy:-2,life:50,color:'#8E44AD',el:'dark',pierce:true});
    } else if(primary==='wind'){
      this.vy = -9; this.vx += dir*5;
      Game.particles.push(...spawnBurst(this.x+12,this.y+30,'#B2EBC8',16));
    } else if(primary==='light'){
      // heal
      Game.hp = Math.min(Game.maxHp, Game.hp+2);
      UI.toast('光之祝福 — 靈力恢復');
      Game.particles.push(...spawnBurst(this.x+12,this.y+12,'#FFD54F',20));
    }
    UI.updateHUD();
  }
  collide(axis){
    const plats = ROOMS[Game.roomId].platforms||[];
    for(const p of plats){
      if(p.locked && !Game.abilities.has(p.locked)) {} // still solid
      if(rectOverlap({x:this.x,y:this.y,w:this.w,h:this.h}, p)){
        if(axis==='x'){
          if(this.vx>0) this.x = p.x - this.w;
          else if(this.vx<0) this.x = p.x + p.w;
          this.vx = 0;
        } else {
          if(this.vy>0){ this.y = p.y - this.h; this.onGround=true; this.canDoubleJump=true; }
          else if(this.vy<0) this.y = p.y + p.h;
          this.vy = 0;
        }
      }
    }
  }
  draw(){
    const sx = Math.round(this.x - Game.cameraX);
    const sy = Math.round(this.y);
    // shadow
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath();ctx.ellipse(sx+12,sy+38,14,3,0,0,Math.PI*2);ctx.fill();
    // glow
    const g = ctx.createRadialGradient(sx+12,sy+18,2,sx+12,sy+18,28);
    g.addColorStop(0,'rgba(0,255,204,.5)');
    g.addColorStop(1,'rgba(0,255,204,0)');
    ctx.fillStyle=g;
    ctx.fillRect(sx-16,sy-10,56,56);

    const flicker = this.invuln>0 && (this.invuln%6<3);
    if(flicker){ ctx.globalAlpha=.4; }

    // ghost body (robe)
    const wobble = Math.sin(this.float)*1.6;
    const bodyColor = this.getSkinColor();
    ctx.fillStyle=bodyColor.robe;
    ctx.beginPath();
    ctx.moveTo(sx+12, sy+wobble);
    ctx.quadraticCurveTo(sx-2, sy+wobble, sx-2, sy+22+wobble);
    ctx.lineTo(sx-2, sy+36+wobble);
    ctx.lineTo(sx+2, sy+33+wobble);
    ctx.lineTo(sx+6, sy+36+wobble);
    ctx.lineTo(sx+10, sy+33+wobble);
    ctx.lineTo(sx+14, sy+36+wobble);
    ctx.lineTo(sx+18, sy+33+wobble);
    ctx.lineTo(sx+22, sy+36+wobble);
    ctx.lineTo(sx+26, sy+33+wobble);
    ctx.lineTo(sx+26, sy+22+wobble);
    ctx.quadraticCurveTo(sx+26, sy+wobble, sx+12, sy+wobble);
    ctx.closePath();
    ctx.fill();
    // edge
    ctx.strokeStyle = bodyColor.edge;
    ctx.lineWidth=1.2;
    ctx.stroke();

    // face
    ctx.fillStyle='#1A0D3A';
    const eyeY = sy+10+wobble;
    if(this.facing>0){
      ctx.fillRect(sx+9,eyeY,2.5,3);
      ctx.fillRect(sx+15,eyeY,2.5,3);
    } else {
      ctx.fillRect(sx+7,eyeY,2.5,3);
      ctx.fillRect(sx+13,eyeY,2.5,3);
    }
    // hair tuft
    ctx.fillStyle=bodyColor.hair;
    ctx.beginPath();
    ctx.moveTo(sx+4, sy+2+wobble);
    ctx.quadraticCurveTo(sx+12, sy-4+wobble, sx+20, sy+2+wobble);
    ctx.lineTo(sx+22, sy+6+wobble);
    ctx.lineTo(sx+2, sy+6+wobble);
    ctx.closePath();
    ctx.fill();

    // element aura
    if(Game.elements[0]){
      ctx.fillStyle = ELEMENTS[Game.elements[0]].color;
      ctx.globalAlpha *= 0.7;
      ctx.beginPath();
      ctx.arc(sx-4+Math.sin(this.float*1.4)*3, sy+24+Math.cos(this.float)*2, 3, 0, Math.PI*2);
      ctx.fill();
    }
    if(Game.elements[1]){
      ctx.fillStyle = ELEMENTS[Game.elements[1]].color;
      ctx.beginPath();
      ctx.arc(sx+28+Math.sin(this.float*1.4+1)*3, sy+24+Math.cos(this.float+1)*2, 3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;

    // attack sweep
    if(this.attacking>5){
      ctx.save();
      ctx.translate(sx+12, sy+18);
      ctx.scale(this.facing,1);
      const t = (18-this.attacking)/13;
      ctx.fillStyle='rgba(0,255,204,.5)';
      ctx.beginPath();
      ctx.moveTo(8,0);
      ctx.arc(8,0,28,-0.8+t*1.6,0.8-t*0.4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle='rgba(155,255,229,.9)';
      ctx.lineWidth=2;
      ctx.stroke();
      ctx.restore();
    }
  }
  getSkinColor(){
    switch(Game.equippedSkin){
      case 'skin_mermaid': return {robe:'#4FC3F7', edge:'#1565C0', hair:'#FF80AB'};
      case 'skin_snow':    return {robe:'#E1F5FE', edge:'#90A4AE', hair:'#B3E5FC'};
      case 'skin_cyber':   return {robe:'#212121', edge:'#FF1744', hair:'#00E5FF'};
      case 'skin_blossom': return {robe:'#FCE4EC', edge:'#AD1457', hair:'#F48FB1'};
      default: return {robe:'#e8d9b0', edge:'#4A7C8E', hair:'#1A0D3A'};
    }
  }
}

class Enemy{
  constructor(x,y,type,el,hp,name){
    this.x=x;this.y=y;this.type=type||'wisp';
    this.el = el || 'dark';
    this.hp = hp ?? (type==='boss'?60:(type==='shade'?5:3));
    this.maxHp = this.hp;
    this.name = name;
    this.w = type==='boss'?64:24;
    this.h = type==='boss'?64:24;
    this.vx=0;this.vy=0;
    this.dead=false;
    this.t=Math.random()*100;
    this.attackCD = 60;
    this.dir = Math.random()<0.5?-1:1;
    this.knock = 0;
  }
  takeDamage(amt,from){
    this.hp -= amt;
    this.knock = from*4;
    Game.particles.push(...spawnBurst(this.x+this.w/2,this.y+this.h/2, ELEMENTS[this.el].color, 8));
    if(this.hp<=0){
      this.dead=true;
      Game.gainSoul(this.type==='boss'?80:15, this.el);
      Game.gainCoin(this.type==='boss'?100:(this.type==='shade'?15:8));
      Game.particles.push(...spawnBurst(this.x+this.w/2,this.y+this.h/2, ELEMENTS[this.el].color, 30));
      if(this.type==='boss'){
        Game.bossDefeated = true;
        Game.shake = 18;
        setTimeout(()=>Game.win(), 1500);
      }
    }
  }
  update(){
    if(this.dead) return;
    this.t += 0.05;
    const px = Game.player.x, py = Game.player.y;
    const dx = px - this.x, dy = py - this.y;
    const dist = Math.hypot(dx,dy);

    if(this.type==='boss'){
      // boss AI: hover, dash, shoot feathers
      this.x += Math.sin(this.t*0.6)*0.8 + this.knock*0.5;
      this.y = 200 + Math.sin(this.t)*40;
      this.knock *= 0.85;
      this.attackCD--;
      if(this.attackCD<=0){
        // shoot 3 feathers fanned toward player
        const ang = Math.atan2(dy,dx);
        for(let i=-1;i<=1;i++){
          const a = ang + i*0.25;
          Game.enemies.push({
            isProj:true,x:this.x+30,y:this.y+30,
            vx:Math.cos(a)*5, vy:Math.sin(a)*5,
            life:120, color:'#B2EBC8', el:'wind',
            update(){this.x+=this.vx;this.y+=this.vy;this.life--;},
            isDead(){return this.life<=0;},
            hitsPlayer(){return rectOverlap({x:this.x-3,y:this.y-3,w:6,h:6},{x:Game.player.x,y:Game.player.y,w:Game.player.w,h:Game.player.h});},
          });
        }
        this.attackCD = 90;
      }
    } else if(this.type==='shade'){
      // shade: teleport occasionally
      if(Math.random()<0.005){
        this.x += (Math.random()-0.5)*100;
      }
      this.x += this.dir*0.7;
      this.y += Math.sin(this.t)*0.4;
      if(this.x<40 || this.x>1140) this.dir*=-1;
    } else if(this.type==='sprite'){
      // sprite: float in place, dive at player
      this.x += Math.sin(this.t)*0.5 + this.knock*0.4;
      this.y += Math.cos(this.t*1.3)*0.6;
      this.knock *= 0.85;
      if(dist<160 && this.attackCD<=0){
        this.vx = dx/dist*2.5;
        this.vy = dy/dist*2.5;
        this.attackCD = 80;
      }
      this.x += this.vx*0.4; this.y += this.vy*0.4;
      this.vx *= 0.95; this.vy *= 0.95;
      this.attackCD--;
    } else {
      // wisp: patrol
      this.x += this.dir * 0.5;
      this.y += Math.sin(this.t*1.5)*0.3;
      if(this.x<40 || this.x>1140) this.dir*=-1;
    }
    // hit player
    if(rectOverlap({x:this.x,y:this.y,w:this.w,h:this.h},{x:Game.player.x,y:Game.player.y,w:Game.player.w,h:Game.player.h})){
      Game.takeDamage(1);
    }
  }
  draw(){
    if(this.dead) return;
    const sx = Math.round(this.x - Game.cameraX);
    const sy = Math.round(this.y);
    const c = ELEMENTS[this.el].color;
    // glow
    const g = ctx.createRadialGradient(sx+this.w/2,sy+this.h/2,2,sx+this.w/2,sy+this.h/2,this.w);
    g.addColorStop(0,c+'cc');
    g.addColorStop(1,c+'00');
    ctx.fillStyle=g;
    ctx.fillRect(sx-12,sy-12,this.w+24,this.h+24);

    if(this.type==='boss'){
      // big wing creature
      ctx.fillStyle = '#1A0D3A';
      ctx.beginPath();ctx.ellipse(sx+32,sy+32,28,30,0,0,Math.PI*2);ctx.fill();
      // wings
      ctx.fillStyle = '#B2EBC8';
      ctx.beginPath();
      ctx.moveTo(sx+8,sy+30);
      ctx.quadraticCurveTo(sx-20,sy+10+Math.sin(this.t*4)*8,sx-26,sy+30);
      ctx.quadraticCurveTo(sx-12,sy+34,sx+8,sy+34);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(sx+56,sy+30);
      ctx.quadraticCurveTo(sx+84,sy+10+Math.cos(this.t*4)*8,sx+90,sy+30);
      ctx.quadraticCurveTo(sx+76,sy+34,sx+56,sy+34);
      ctx.fill();
      // eye
      ctx.fillStyle='#C0392B';
      ctx.fillRect(sx+24,sy+22,6,6); ctx.fillRect(sx+34,sy+22,6,6);
      // hp bar
      ctx.fillStyle='rgba(0,0,0,.6)';
      ctx.fillRect(sx-10,sy-16,84,6);
      ctx.fillStyle='#C0392B';
      ctx.fillRect(sx-9,sy-15,82*(this.hp/this.maxHp),4);
      ctx.fillStyle='#e8d9b0';
      ctx.font='10px serif';
      ctx.fillText(this.name||'Boss', sx-2, sy-20);
    } else {
      // ghost mob
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(sx+12,sy+10,11,12,0,0,Math.PI*2);
      ctx.fill();
      // tail wisps
      ctx.beginPath();
      ctx.moveTo(sx+2,sy+18);
      ctx.lineTo(sx+5,sy+24+Math.sin(this.t*3)*2);
      ctx.lineTo(sx+8,sy+18);
      ctx.lineTo(sx+12,sy+24+Math.sin(this.t*3+1)*2);
      ctx.lineTo(sx+16,sy+18);
      ctx.lineTo(sx+19,sy+24+Math.sin(this.t*3+2)*2);
      ctx.lineTo(sx+22,sy+18);
      ctx.closePath();
      ctx.fill();
      // eyes
      ctx.fillStyle='#1A0D3A';
      ctx.fillRect(sx+8,sy+8,2.5,3);
      ctx.fillRect(sx+14,sy+8,2.5,3);
    }
  }
}

function rectOverlap(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}
function spawnBurst(x,y,color,n){
  const arr=[];
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 1+Math.random()*3;
    arr.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:30+Math.random()*20,color});
  }
  return arr;
}

/* -------------------- Input -------------------- */
const Input = {
  left:false,right:false,up:false,down:false,
  jumpPressed:false,attackPressed:false,skillPressed:false,swapPressed:false,mapPressed:false,
};
window.addEventListener('keydown',e=>{
  switch(e.key){
    case 'a':case 'A': Input.left=true;break;
    case 'd':case 'D': Input.right=true;break;
    case 'w':case 'W': Input.up=true;break;
    case 's':case 'S': Input.down=true;break;
    case ' ': if(!e.repeat) Input.jumpPressed=true; e.preventDefault(); break;
    case 'l':case 'L': if(!e.repeat) Input.attackPressed=true; break;
    case 'Enter': if(!e.repeat) Input.skillPressed=true; e.preventDefault(); break;
    case 'q':case 'Q': if(!e.repeat) UI.swapElements(-1); break;
    case 'e':case 'E': if(!e.repeat) UI.swapElements(1); break;
    case 'Tab': e.preventDefault(); UI.openMap(); break;
    case 'b':case 'B': UI.openShop(); break;
    case 'Escape': UI.closeMap(); UI.closeShop(); break;
  }
});
window.addEventListener('keyup',e=>{
  switch(e.key){
    case 'a':case 'A': Input.left=false;break;
    case 'd':case 'D': Input.right=false;break;
    case 'w':case 'W': Input.up=false;break;
    case 's':case 'S': Input.down=false;break;
  }
});
// Touch joystick
(function(){
  const joy = document.getElementById('joy');
  const stick = document.getElementById('joy-stick');
  let active = null;
  joy.addEventListener('touchstart', e=>{ active = e.targetTouches[0].identifier; handle(e); e.preventDefault(); });
  joy.addEventListener('touchmove',  e=>{ handle(e); e.preventDefault(); });
  joy.addEventListener('touchend',   e=>{ active = null; reset(); e.preventDefault(); });
  joy.addEventListener('touchcancel',e=>{ active = null; reset(); });
  function handle(e){
    const rect = joy.getBoundingClientRect();
    let t;
    for(const tt of e.touches){ if(tt.identifier===active){ t=tt; break; } }
    if(!t) t = e.touches[0];
    const cx = rect.left+rect.width/2, cy=rect.top+rect.height/2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const r = Math.hypot(dx,dy), max=50;
    if(r>max){ dx*=max/r; dy*=max/r; }
    stick.style.transform = `translate(${dx}px,${dy}px)`;
    Input.left  = dx < -12;
    Input.right = dx >  12;
    Input.up    = dy < -12;
    Input.down  = dy >  12;
  }
  function reset(){ stick.style.transform='translate(0,0)'; Input.left=Input.right=Input.up=Input.down=false; }
})();
document.querySelectorAll('.tc-btn[data-key]').forEach(btn=>{
  const key = btn.dataset.key;
  btn.addEventListener('touchstart',e=>{ e.preventDefault(); press(key); });
  btn.addEventListener('mousedown', e=>{ press(key); });

function press(k){
  if(k==='jump') Input.jumpPressed=true;
  if(k==='attack') Input.attackPressed=true;
  if(k==='skill') Input.skillPressed=true;
  if(k==='swap') UI.swapElements(1);
  if(k==='map') UI.openMap();
}

/* -------------------- Loop -------------------- */
const Loop = {
  last:0,
  start(){ requestAnimationFrame(this.tick.bind(this)); },
  tick(t){
    const dt = Math.min(40, t - this.last);
    this.last = t;
    if(Game.state==='playing' || Game.state==='win'){
      Game.player.update();
      for(const e of Game.enemies){
        if(e.isProj){
          e.update();
          if(e.hitsPlayer()){ Game.takeDamage(1); e.life=0; }
        } else e.update();
      }
      Game.enemies = Game.enemies.filter(e=> e.isProj? !e.isDead() : !e.dead);
      // projectiles
      for(const p of Game.projectiles){
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
        // hit enemies
        for(const en of Game.enemies){
          if(en.dead||en.isProj) continue;
          if(rectOverlap({x:p.x-4,y:p.y-4,w:8,h:8},{x:en.x,y:en.y,w:en.w,h:en.h})){
            let dmg = 2; if(Game.elements.includes(en.el)) dmg++;
            en.takeDamage(dmg, Math.sign(p.vx)||1);
            if(!p.pierce) p.life=0;
          }
        }
      }
      Game.projectiles = Game.projectiles.filter(p=>p.life>0);
      for(const p of Game.particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--; }
      Game.particles = Game.particles.filter(p=>p.life>0);

      // camera
      const targetCX = Math.max(0, Math.min(1200-window.innerWidth, Game.player.x - window.innerWidth/2));
      Game.cameraX += (targetCX - Game.cameraX)*0.15;
      if(Game.shake>0){ Game.shake--; }
    }
    Render.draw();
    requestAnimationFrame(this.tick.bind(this));
  },
};

/* -------------------- Render -------------------- */
const Render = {
  draw(){
    const W = canvas.width/DPR, H = canvas.height/DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    // shake
    let sox=0,soy=0;
    if(Game.shake>0){ sox=(Math.random()-.5)*Game.shake; soy=(Math.random()-.5)*Game.shake; }
    ctx.save();
    ctx.translate(sox,soy);

    // background
    this.drawBG(W,H);
    // platforms
    const r = ROOMS[Game.roomId];
    if(r){
      for(const p of (r.platforms||[])){
        this.drawPlatform(p);
      }
      // pickups
      for(const pk of Game.pickups){
        if(pk.picked) continue;
        const sx = pk.x - Game.cameraX, sy = pk.y;
        if(pk.type==='soulOrb'){
          ctx.fillStyle='rgba(0,255,204,.3)';
          ctx.beginPath();ctx.arc(sx+8,sy+8+Math.sin(Date.now()*0.004)*3,16,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#9bffe5';
          ctx.beginPath();ctx.arc(sx+8,sy+8+Math.sin(Date.now()*0.004)*3,6,0,Math.PI*2);ctx.fill();
        } else if(pk.type==='jar'){
          ctx.fillStyle='#FFD54F';
          ctx.fillRect(sx,sy+4,16,12);
          ctx.fillStyle='#E0A930';
          ctx.fillRect(sx+2,sy,12,4);
        }
      }
      // projectiles
      for(const p of Game.projectiles){
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 12;
        ctx.beginPath();ctx.arc(p.x-Game.cameraX, p.y, 6, 0, Math.PI*2);ctx.fill();
        ctx.shadowBlur = 0;
      }
      // enemies
      for(const e of Game.enemies){
        if(e.isProj){
          ctx.fillStyle = e.color;
          ctx.shadowColor=e.color;ctx.shadowBlur=8;
          ctx.beginPath();ctx.arc(e.x-Game.cameraX,e.y,4,0,Math.PI*2);ctx.fill();
          ctx.shadowBlur=0;
        } else e.draw();
      }
      // player
      Game.player.draw();
      // particles
      for(const p of Game.particles){
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.life/40);
        ctx.fillRect(p.x-Game.cameraX-1, p.y-1, 2.5, 2.5);
      }
      ctx.globalAlpha=1;
      // door hints (room edges)
      this.drawDoorHints(r);
    }
    ctx.restore();
    // vignette
    const vg = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.4,W/2,H/2,Math.max(W,H)*0.7);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,.55)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  },
  drawBG(W,H){
    const r = ROOMS[Game.roomId];
    const palette = {
      entrance: ['#1A0D3A','#241055','#4A7C8E'],
      water:    ['#0d2b3e','#1A4D6A','#4FC3F7'],
      fire:     ['#2a0d0d','#5a2010','#FF8C42'],
      dark:     ['#0d0a1a','#2e1a4a','#8E44AD'],
      wind:     ['#0a2a1f','#2a5a4a','#B2EBC8'],
      secret:   ['#1a1d3a','#3a4a6a','#FFD54F'],
    };
    const p = palette[r.bg] || palette.entrance;
    const grd = ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,p[0]); grd.addColorStop(1,p[1]);
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

    // parallax silhouettes
    const off = Game.cameraX*0.3;
    ctx.fillStyle = p[1];
    ctx.globalAlpha = .55;
    for(let i=0;i<6;i++){
      const x = ((i*220 - off) % (W+220)) - 100;
      ctx.beginPath();
      ctx.moveTo(x, H);
      ctx.lineTo(x+40, H-160);
      ctx.lineTo(x+90, H-100);
      ctx.lineTo(x+140, H-180);
      ctx.lineTo(x+200, H);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha=1;

    // floating particles (atmosphere)
    const t = Date.now()*0.0002;
    ctx.fillStyle = p[2];
    ctx.globalAlpha = .3;
    for(let i=0;i<30;i++){
      const x = ((i*73 + t*200) % W);
      const y = ((i*131 + Math.sin(t*4+i)*40) % H);
      ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  },
  drawPlatform(p){
    const sx = p.x - Game.cameraX, sy = p.y;
    if(p.locked && !Game.abilities.has(p.locked)){
      // sealed door visual (dim)
      ctx.fillStyle='rgba(80,40,40,.6)';
      ctx.fillRect(sx,sy,p.w,p.h);
      ctx.strokeStyle = ELEMENTS[p.locked].color;
      ctx.lineWidth = 2;
      ctx.strokeRect(sx+1,sy+1,p.w-2,p.h-2);
      return;
    }
    // base stone
    const grad = ctx.createLinearGradient(0,sy,0,sy+p.h);
    if(p.hot){
      grad.addColorStop(0,'#FF6B35');
      grad.addColorStop(1,'#6A1B0F');
    } else {
      grad.addColorStop(0,'#5a6f7c');
      grad.addColorStop(1,'#2a3540');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(sx,sy,p.w,p.h);
    // top highlight
    ctx.fillStyle = p.hot?'rgba(255,200,120,.55)':'rgba(155,200,220,.35)';
    ctx.fillRect(sx,sy,p.w,2);
    // moss/cracks
    ctx.fillStyle = p.hot?'rgba(255,140,80,.25)':'rgba(0,255,204,.12)';
    for(let i=0;i<p.w;i+=24){
      ctx.fillRect(sx+i+2, sy+4, 8, 1);
    }
  },
  drawDoorHints(r){
    const W = canvas.width/DPR, H = canvas.height/DPR;
    ctx.save();
    ctx.font='10px "Noto Serif TC", serif';
    ctx.fillStyle='rgba(0,255,204,.6)';
    if(r.exits.left!==undefined){
      const targetRoom = ROOMS[r.exits.left];
      const gated = targetRoom?.gate && !Game.abilities.has(targetRoom.gate);
      ctx.fillStyle = gated?'rgba(192,57,43,.8)':'rgba(0,255,204,.7)';
      ctx.fillText(gated?'⛔ '+ELEMENTS[targetRoom.gate].name:'← '+targetRoom.name, 8, H/2 -Game.cameraX*0+10);
    }
    if(r.exits.right!==undefined){
      const targetRoom = ROOMS[r.exits.right];
      const gated = targetRoom?.gate && !Game.abilities.has(targetRoom.gate);
      ctx.fillStyle = gated?'rgba(192,57,43,.8)':'rgba(0,255,204,.7)';
      const txt = gated?ELEMENTS[targetRoom.gate].name+' ⛔':targetRoom.name+' →';
      ctx.textAlign = 'right';
      ctx.fillText(txt, W-8, H/2+10);
      ctx.textAlign = 'left';
    }
    if(r.exits.up!==undefined){
      ctx.fillText('↑ 隱密', W/2 - 20, 24);
    }
    ctx.restore();
  },
};

/* -------------------- UI -------------------- */
const UI = {
  toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(this._tt);
    this._tt = setTimeout(()=>t.classList.remove('show'), 2200);
  },
  showArea(name){
    const el = document.getElementById('area-name');
    el.textContent = name;
    el.classList.add('show');
    clearTimeout(this._area);
    this._area = setTimeout(()=>el.classList.remove('show'), 2400);
  },
  dialog(name,text){
    document.getElementById('d-name').textContent = name;
    document.getElementById('d-text').textContent = text;
    document.getElementById('dialog').style.display='block';
  },
  closeDialog(){ document.getElementById('dialog').style.display='none'; },
  updateHUD(){
    document.getElementById('hp-fill').style.width = (Game.hp/Game.maxHp*100)+'%';
    document.getElementById('soul-fill').style.width = (Game.soul/Game.maxSoul*100)+'%';
    document.getElementById('coin-amt').textContent = Game.coins;
    for(let i=0;i<2;i++){
      const chip = document.getElementById('el-'+(i+1));
      const el = Game.elements[i];
      if(el){
        chip.textContent = ELEMENTS[el].symbol;
        chip.style.background = ELEMENTS[el].color;
        chip.style.color = '#1a1228';
      } else {
        chip.textContent='—';
        chip.style.background='#444';
        chip.style.color='#999';
      }
    }
  },
  swapElements(dir){
    const u = [...Game.unlockedEl];
    if(u.length<2){ this.toast('需收集更多靈能屬性'); return; }
    // cycle slot 0 only for simplicity
    const idx = u.indexOf(Game.elements[0]);
    const next = u[(idx + dir + u.length) % u.length];
    if(next === Game.elements[1]){
      Game.elements[0] = next;
      Game.elements[1] = u[idx]; // swap
    } else {
      Game.elements[0] = next;
    }
    this.toast('屬性切換 → '+ELEMENTS[next].name);
    this.updateHUD();
  },
  openMap(){
    document.getElementById('modal-map').classList.add('show');
    this.drawMap();
    document.getElementById('map-rooms').textContent = Game.visited.size;
    const el = Game.elements.filter(Boolean).map(e=>ELEMENTS[e].name).join('+') || '無';
    document.getElementById('map-el-status').textContent = el;
  },
  closeMap(){ document.getElementById('modal-map').classList.remove('show'); },
  drawMap(){
    const c = document.getElementById('map-canvas');
    const x = c.getContext('2d');
    x.clearRect(0,0,c.width,c.height);
    // parchment
    x.fillStyle='#e8d9b0';
    x.fillRect(0,0,c.width,c.height);
    x.strokeStyle='#6a4a1c';
    x.lineWidth = 2;
    const cellW = 80, cellH = 60, ox = 30, oy = 40;
    // connections
    x.strokeStyle = 'rgba(106,74,28,.6)';
    x.lineWidth = 2;
    for(const r of ROOMS){
      const cx = ox + r.col*cellW + cellW/2;
      const cy = oy + r.row*cellH + cellH/2;
      if(r.exits.right!==undefined){
        const t = ROOMS[r.exits.right];
        x.beginPath();x.moveTo(cx,cy);x.lineTo(ox+t.col*cellW+cellW/2, oy+t.row*cellH+cellH/2);x.stroke();
      }
      if(r.exits.up!==undefined){
        const t = ROOMS[r.exits.up];
        x.beginPath();x.moveTo(cx,cy);x.lineTo(ox+t.col*cellW+cellW/2, oy+t.row*cellH+cellH/2);x.stroke();
      }
    }
    // rooms
    for(const r of ROOMS){
      const rx = ox + r.col*cellW + 6;
      const ry = oy + r.row*cellH + 6;
      const w = cellW-12, h = cellH-12;
      const visited = Game.visited.has(r.id);
      if(r.id===Game.roomId){
        x.fillStyle='#C0392B'; x.fillRect(rx-2,ry-2,w+4,h+4);
        x.fillStyle='#e8d9b0';
      } else if(visited){
        x.fillStyle='#3a1f0a';
      } else {
        x.fillStyle='rgba(106,74,28,.25)';
      }
      x.fillRect(rx,ry,w,h);
      x.strokeStyle = visited?'#3a1f0a':'#6a4a1c';
      x.setLineDash(visited?[]:[3,3]);
      x.strokeRect(rx,ry,w,h);
      x.setLineDash([]);
      // boss marker
      if(r.enemies && r.enemies.some(e=>e.type==='boss')){
        x.fillStyle='#FFD54F';
        x.beginPath();x.arc(rx+w-8,ry+8,4,0,Math.PI*2);x.fill();
      }
      // label
      if(visited){
        x.fillStyle = (r.id===Game.roomId)?'#e8d9b0':'#e8d9b0';
        x.font='10px "Noto Serif TC", serif';
        x.textAlign='center';
        x.fillText(r.name, rx+w/2, ry+h/2+4);
      } else {
        x.fillStyle='#6a4a1c';
        x.textAlign='center';
        x.font='14px serif';
        x.fillText('？', rx+w/2, ry+h/2+5);
      }
    }
    x.textAlign='left';
  },
  openShop(){
    document.getElementById('modal-shop').classList.add('show');
    this.shopTab('cos');
  },
  closeShop(){ document.getElementById('modal-shop').classList.remove('show'); },
  shopTab(tab){
    document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
    const items = SHOP_ITEMS[tab];
    const el = document.getElementById('shop-content');
    el.innerHTML='';
    for(const it of items){
      const owned = (tab==='cos' && Game.ownedSkins.has(it.id)) || Game.inv[it.id];
      const equipped = (tab==='cos' && Game.equippedSkin===it.id);
      const row = document.createElement('div');
      row.className='shop-item';
      row.innerHTML = `
        <div class="shop-icon" style="background:${tab==='cos'?'linear-gradient(135deg,#1A0D3A,#4A7C8E)':'linear-gradient(135deg,#3a1f0a,#6a4a1c)'}">${it.icon}</div>
        <div class="shop-info">
          <div class="shop-name">${it.name} ${equipped?'<span style="color:#3a5a3a;font-size:11px;">（裝備中）</span>':''}</div>
          <div class="shop-desc">${it.desc}</div>
          <div style="font-size:11px;color:#6a4a1c;margin-top:3px;">${it.priceTW || (it.price===0?'內建':('NT$'+it.price))} ${it.price>0?' ｜ 或 '+(it.price*15)+' 靈幣':''}</div>
        </div>
        <button class="shop-buy ${owned?'owned':''}"
          onclick="UI.buy('${tab}','${it.id}', ${it.price*15})"
          ${owned&&tab!=='cos' ? 'disabled' : ''}>
          ${owned ? (tab==='cos' ? (equipped?'裝備中':'裝備') : '已擁有') : '購買'}
        </button>
      `;
      el.appendChild(row);
    }
  },
  buy(tab,id,coinCost){
    if(tab==='cos'){
      if(Game.ownedSkins.has(id)){
        Game.equippedSkin = id;
        this.toast('已裝備 — '+SHOP_ITEMS.cos.find(s=>s.id===id).name);
        this.shopTab('cos');
        return;
      }
      if(Game.coins < coinCost){ this.toast('靈幣不足 ('+coinCost+')'); return; }
      Game.coins -= coinCost;
      Game.ownedSkins.add(id);
      Game.equippedSkin = id;
      this.toast('購買並裝備 — '+SHOP_ITEMS.cos.find(s=>s.id===id).name);
    } else {
      if(Game.inv[id]){ this.toast('已擁有'); return; }
      if(Game.coins < coinCost){ this.toast('靈幣不足 ('+coinCost+')'); return; }
      Game.coins -= coinCost;
      Game.inv[id] = true;
      if(id==='revive') Game.inv.revive = (Game.inv.revive===true?3:3);
      this.toast('購買成功');
    }
    this.updateHUD();
    this.shopTab(tab);
  },
};
// Dialog dismiss
document.getElementById('dialog').addEventListener('click', ()=> UI.closeDialog());

UI.updateHUD();

// Demo: give 200 starter coins so shop is exploreable
Game.coins = 200;
UI.updateHUD();

</script>
